<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#e4e4e7;font-family:'JetBrains Mono',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow-x:hidden;}
#app{width:420px;padding:16px;position:relative;}
h1{font-family:'Archivo Black',sans-serif;font-size:28px;color:#f59e0b;text-align:center;letter-spacing:6px;margin-bottom:2px;}
.version{text-align:center;font-size:10px;color:#f59e0b;margin-bottom:14px;}
#lobby{text-align:center;}
.lobby-section{margin-bottom:14px;}
.lobby-label{font-size:11px;color:#d4d4d8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.lobby-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.lbtn{background:#12121a;border:2px solid #2a2a4a;border-radius:8px;color:#d4d4d8;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:10px 16px;cursor:pointer;transition:all 0.15s;min-width:60px;}
.lbtn:hover{border-color:#f59e0b;color:#f59e0b;}
.lbtn.active{background:#f59e0b;color:#0a0a0f;border-color:#f59e0b;}
.lbtn.disabled{opacity:0.3;pointer-events:none;}
.play-btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0a0f;font-family:'Archivo Black',sans-serif;font-size:18px;letter-spacing:4px;padding:14px 48px;border:none;border-radius:10px;cursor:pointer;margin-top:16px;transition:all 0.2s;}
.play-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,0.3);}
.lobby-hint{font-size:11px;color:#b0b0b8;margin-top:8px;}
#game{display:none;}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.game-title{font-family:'Archivo Black',sans-serif;font-size:16px;color:#f59e0b;letter-spacing:3px;}
.back-btn{background:none;border:1px solid #2a2a4a;color:#d4d4d8;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;}
.back-btn:hover{border-color:#f59e0b;color:#f59e0b;}
.stats{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:#d4d4d8;}
.stats .val{color:#e4e4e7;font-weight:700;}
.pool-area{display:flex;margin-bottom:10px;padding:12px;background:#12121a;border:1px solid #1e1e2e;border-radius:10px;gap:12px;align-items:center;}
.pool-left{flex:1;}.pool-label{font-size:11px;color:#d4d4d8;letter-spacing:2px;text-transform:uppercase;}
.pool-value{font-family:'Archivo Black',sans-serif;font-size:34px;color:#f59e0b;line-height:1.2;}.pool-unit{font-size:12px;color:#d4d4d8;}
.players-list{display:flex;flex-direction:column;gap:4px;min-width:110px;}
.player-row{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;transition:all 0.2s;}
.player-row .p-order{font-size:10px;color:#f59e0b;min-width:14px;}.player-row .p-name{min-width:40px;}
.player-row .p-drop{font-family:'Archivo Black',sans-serif;font-size:14px;min-width:20px;text-align:center;opacity:0;transition:opacity 0.3s;}
.player-row .p-drop.show{opacity:1;}.player-row .p-remaining{font-size:10px;color:#f59e0b;min-width:24px;}
.player-row.active{transform:scale(1.05);}.player-row.done{opacity:0.5;}
.drop-info{text-align:center;margin-bottom:8px;min-height:44px;display:flex;align-items:center;justify-content:center;gap:10px;}
.drop-who{font-size:11px;color:#d4d4d8;min-width:50px;text-align:right;}
.drop-power-value{font-family:'Archivo Black',sans-serif;font-size:32px;line-height:1;min-width:44px;text-align:center;}
.drop-remaining{font-size:14px;color:#d4d4d8;min-width:80px;text-align:left;}.drop-remaining .rem{color:#f59e0b;font-weight:700;}
.dp1{color:#f59e0b;}.dp2{color:#6a8;}.dp3{color:#4ad;}.dp4{color:#c82;}.dp5{color:#d44;}
.dp6{color:#d26;}.dp7{color:#a3d;}.dp8{color:#63e;}.dp9{color:#24f;}.dp10{color:#e22;font-size:36px;text-shadow:0 0 12px rgba(224,16,16,0.4);}
.col-selectors{display:grid;gap:4px;margin-bottom:4px;padding:0 2px;}
.col-btn{background:#1a1a2e;border:2px solid #2a2a4a;border-radius:6px 6px 0 0;color:#f59e0b;font-size:18px;font-weight:700;padding:8px 0;cursor:pointer;transition:all 0.15s;text-align:center;}
.col-btn:hover{background:#2a2a4a;border-color:#f59e0b;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,0.2);}
.col-btn:active{transform:translateY(0);}.col-btn.disabled{opacity:0.3;pointer-events:none;}
.grid-wrap{padding:3px;background:#12121a;border-radius:6px;border:1px solid #1e1e2e;}
.grid{display:grid;gap:3px;}
.cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;transition:all 0.15s;position:relative;overflow:hidden;}
.cell.h10{background:#6b4226;color:#fff;border:2px solid #7d4e2e;}.cell.h9{background:#6e4a2a;color:#fff;border:2px solid #80522e;}
.cell.h8{background:#72522e;color:#fff;border:2px solid #845a32;}.cell.h7{background:#765a34;color:#fff;border:2px solid #886238;}
.cell.h6{background:#7a623a;color:#fff;border:2px solid #8c6a3e;}.cell.h5{background:#7e6a40;color:#fff;border:2px solid #907246;}
.cell.h4{background:#88784e;color:#fff;border:2px solid #9a8456;}.cell.h3{background:#92865c;color:#fff;border:2px solid #a49264;}
.cell.h2{background:#a89878;color:#1a1a2e;border:2px solid #b8a888;}.cell.h1{background:#c0b090;color:#1a1a2e;border:2px solid #d0c0a0;}
.cell.h0{background:#1a1a2e;color:transparent;border:2px solid #2a2a4a;}
.cell .power-tag{position:absolute;font-size:8px;font-weight:700;line-height:1;z-index:5;text-shadow:0 0 3px rgba(0,0,0,0.9),0 0 6px rgba(0,0,0,0.7);}
.cell.water-hit{animation:waterHit 0.25s ease;}
@keyframes waterHit{0%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:inset 0 0 15px 5px rgba(245,158,11,0.5);}100%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0);}}
.cell.washed{animation:washAway 0.35s ease;}
@keyframes washAway{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:0.6;background:#f59e0b;}100%{transform:scale(1);opacity:1;}}
.payout-area{min-height:28px;margin-top:8px;text-align:center;font-size:13px;color:#d4d4d8;}
.info-bar{display:flex;justify-content:space-between;margin-top:10px;font-size:10px;color:#f59e0b;border-top:1px solid #1e1e2e;padding-top:6px;}
.channel-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,0.12) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:100;}
.channel-flash.show{opacity:1;}
.rotate-indicator{text-align:center;font-size:11px;color:#f59e0b;padding:4px 0;opacity:0;transition:opacity 0.3s;}
.rotate-indicator.show{opacity:1;}
</style></head><body>
<div id="app">
    <h1>NOISORE</h1><div class="version">v4.2</div>
    <div id="lobby">
        <div class="lobby-section">
            <div class="lobby-label">Mode</div>
            <div class="lobby-row">
                <button class="lbtn active" onclick="setMode('solo')" id="mode-solo">EROSION</button>
                <button class="lbtn" onclick="setMode('pvp')" id="mode-pvp">NOISORE</button>
                <button class="lbtn" onclick="setMode('bet')" id="mode-bet">Bet&Wet</button>
            </div>
        </div>
        <div class="lobby-section">
            <div class="lobby-label">Grid</div>
            <div class="lobby-row">
                <button class="lbtn active" onclick="setGrid(6)" id="grid-6">6×6</button>
                <button class="lbtn" onclick="setGrid(8)" id="grid-8">8×8</button>
            </div>
        </div>
        <div class="lobby-section">
            <div class="lobby-label">Rotation</div>
            <div class="lobby-row">
                <button class="lbtn" onclick="setRotation(false)" id="rot-off">OFF</button>
                <button class="lbtn active" onclick="setRotation(true)" id="rot-on">ON</button>
            </div>
        </div>
        <div class="lobby-section" id="stake-section" style="display:none">
            <div class="lobby-label">Stake per drop</div>
            <div class="lobby-row">
                <button class="lbtn active" onclick="setStake(0)" id="stake-0">FREE</button>
                <button class="lbtn" onclick="setStake(0.1)" id="stake-01">0.10</button>
                <button class="lbtn" onclick="setStake(0.5)" id="stake-05">0.50</button>
                <button class="lbtn" onclick="setStake(1)" id="stake-1">1.00</button>
                <button class="lbtn" onclick="setStake(5)" id="stake-5">5.00</button>
            </div>
        </div>
        <div class="lobby-section" id="bots-section" style="display:none">
            <div class="lobby-label">Opponents</div>
            <div class="lobby-row">
                <button class="lbtn" onclick="setBots(1)" id="bots-1">1</button>
                <button class="lbtn active" onclick="setBots(2)" id="bots-2">2</button>
                <button class="lbtn" onclick="setBots(4)" id="bots-4">4</button>
                <button class="lbtn" onclick="setBots(7)" id="bots-7">7</button>
                <button class="lbtn" onclick="setBots(11)" id="bots-11">11</button>
            </div>
        </div>
        <div class="lobby-section" id="fighter-section" style="display:none">
            <div class="lobby-label">Pick your fighter</div>
            <div class="lobby-row">
                <button class="lbtn" onclick="betRemove('DEEP')" oncontextmenu="return betAdd('DEEP',event)" id="f-DEEP" style="border-color:#4ad;">DEEP</button>
                <button class="lbtn" onclick="betRemove('LIGHT')" oncontextmenu="return betAdd('LIGHT',event)" id="f-LIGHT" style="border-color:#d4a;">LIGHT</button>
                <button class="lbtn" onclick="betRemove('SNIPER')" oncontextmenu="return betAdd('SNIPER',event)" id="f-SNIPER" style="border-color:#4d8;">SNIPER</button>
                <button class="lbtn" onclick="betRemove('GREEDY')" oncontextmenu="return betAdd('GREEDY',event)" id="f-GREEDY" style="border-color:#a6f;">GREEDY</button>
                <button class="lbtn" onclick="betRemove('POWER')" oncontextmenu="return betAdd('POWER',event)" id="f-POWER" style="border-color:#fa0;">POWER</button>
                <button class="lbtn" onclick="betRemove('RANDOM')" oncontextmenu="return betAdd('RANDOM',event)" id="f-RANDOM" style="border-color:#f66;">RANDOM</button>
            </div>
            <div class="lobby-hint" id="fighter-odds"></div>
        </div>
        <button class="play-btn" onclick="startGame()">▶ PLAY</button>
        <div class="lobby-hint">Water beats stone. Skill beats luck.</div>
    </div>
    <div id="game">
        <div class="game-header">
            <span class="game-title" id="game-mode-label">EROSION</span>
            <button class="back-btn" onclick="backToLobby()">✕ LOBBY</button>
        </div>
        <div class="stats"><div>BALANCE <span class="val" id="balance">100.00</span></div><div>DROPS <span class="val" id="drop-num">0</span></div><div>ROUND <span class="val" id="round-num">1</span></div></div>
        <div class="pool-area" id="pool-area-wrap" style="display:none"><div class="pool-left"><div class="pool-label">Prize Pool</div><div class="pool-value" id="pool-value">0.00</div><div class="pool-unit">USDT</div></div><div class="players-list" id="players-list"></div></div>
        <div class="drop-info"><div class="drop-who" id="drop-who">YOUR<br>DROP</div><div class="drop-power-value" id="drop-power">&mdash;</div><div class="drop-remaining" id="drop-remaining"></div></div>
        <div class="col-selectors" id="col-btns"></div>
        <div class="grid-wrap"><div class="grid" id="grid"></div></div>
        <div class="rotate-indicator" id="rotate-ind">↻ rotated 90°</div>
        <div class="payout-area" id="payout-area"></div>
        <div class="info-bar"><div id="info-left">6×6</div><div id="info-right">free play</div></div>
    </div>
</div>
<div class="channel-flash" id="channel-flash"></div>
<script src="engine.js"></script>
<script>
requireEngine(1);
var CFG={mode:'solo',gridSize:6,rotate:true,stake:0,numBots:2,fighter:'DEEP',bets:{}};
var BOT_POOL=[
    {name:'Axel',color:'#4ad',smart:false},{name:'Kira',color:'#d4a',smart:true},
    {name:'Rex',color:'#4d8',smart:false},{name:'Nova',color:'#a6f',smart:true},
    {name:'Zed',color:'#f66',smart:false},{name:'Ivy',color:'#6d6',smart:true},
    {name:'Bolt',color:'#fa0',smart:false},{name:'Luna',color:'#8af',smart:true},
    {name:'Jinx',color:'#f4a',smart:false},{name:'Sage',color:'#ad4',smart:true},
    {name:'Dex',color:'#6af',smart:false}
];
var BET_FIGHTERS=[
    {name:'DEEP',color:'#4ad'},
    {name:'LIGHT',color:'#d4a'},
    {name:'SNIPER',color:'#4d8'},
    {name:'GREEDY',color:'#a6f'},
    {name:'POWER',color:'#fa0'},
    {name:'RANDOM',color:'#f66'}
];
var OVERROUND=1.10; // 10% margin
// 500K simulation data: pct per config [DEEP,LIGHT,SNIPER,GREEDY,POWER,RANDOM]
var BET_DATA={
    '6-off':[19.9,17.0,18.7,18.8,19.8,5.9],
    '6-on': [18.8,19.2,17.7,17.9,18.2,8.2],
    '8-off':[19.9,17.0,18.7,18.8,19.8,5.9], // placeholder until 8x8 500K
    '8-on': [18.8,19.2,17.7,17.9,18.2,8.2]  // placeholder until 8x8 500K
};
function calcOdds(){
    var key=CFG.gridSize+'-'+(CFG.rotate?'on':'off');
    var pcts=BET_DATA[key];
    for(var i=0;i<BET_FIGHTERS.length;i++){
        BET_FIGHTERS[i].pct=pcts[i];
        BET_FIGHTERS[i].odds=Math.round(100/pcts[i]/OVERROUND*10)/10;
    }
}
function setMode(m){
    CFG.mode=m;
    document.querySelectorAll('#lobby .lobby-section:first-child .lbtn').forEach(function(b){b.classList.remove('active');});
    document.getElementById('mode-'+m).classList.add('active');
    document.getElementById('bots-section').style.display=m==='pvp'?'':'none';
    document.getElementById('stake-section').style.display=m==='solo'?'none':'';
    document.getElementById('fighter-section').style.display=m==='bet'?'':'none';
}
function setGrid(s){CFG.gridSize=s;document.getElementById('grid-6').classList.toggle('active',s===6);document.getElementById('grid-8').classList.toggle('active',s===8);calcOdds();updateBetDisplay();}
function setRotation(on){CFG.rotate=on;document.getElementById('rot-off').classList.toggle('active',!on);document.getElementById('rot-on').classList.toggle('active',on);calcOdds();updateBetDisplay();}
function setStake(v){CFG.stake=v;document.querySelectorAll('#stake-section .lbtn').forEach(function(b){b.classList.remove('active');});var id='stake-'+String(v).replace('.','');var el=document.getElementById(id);if(el)el.classList.add('active');}
function setBots(n){CFG.numBots=n;document.querySelectorAll('#bots-section .lbtn').forEach(function(b){b.classList.remove('active');});document.getElementById('bots-'+n).classList.add('active');}
function setFighter(name){
    CFG.fighter=name;
    document.querySelectorAll('#fighter-section .lbtn').forEach(function(b){b.classList.remove('active');});
    document.getElementById('f-'+name).classList.add('active');
    var f=BET_FIGHTERS.filter(function(x){return x.name===name;})[0];
    document.getElementById('fighter-odds').textContent=f.name+': wins '+f.pct+'% \u2192 pays \u00d7'+f.odds;
}
function betAdd(name,e){
    e.preventDefault();
    if(!CFG.bets[name])CFG.bets[name]=0;
    CFG.bets[name]++;
    updateBetDisplay();
    return false;
}
function betRemove(name){
    if(CFG.bets[name]&&CFG.bets[name]>0)CFG.bets[name]--;
    if(CFG.bets[name]===0)delete CFG.bets[name];
    updateBetDisplay();
}
function updateBetDisplay(){
    BET_FIGHTERS.forEach(function(f){
        var el=document.getElementById('f-'+f.name);
        var cnt=CFG.bets[f.name]||0;
        el.textContent=f.name+(cnt>0?' ('+cnt+')':'');
        el.classList.toggle('active',cnt>0);
    });
    var totalBets=0;for(var k in CFG.bets)totalBets+=CFG.bets[k];
    var cost=totalBets*(CFG.stake>0?CFG.stake:1);
    document.getElementById('fighter-odds').textContent='Total bets: '+totalBets+' = '+cost.toFixed(2)+' USDT  (right-click +1, left-click -1)';
}
function startGame(){
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='block';
    COLS=CFG.gridSize;ROWS=CFG.gridSize;MAX_H=10;MAX_DROP=10;
    ROTATE=CFG.rotate;
    DROP_COST=(CFG.mode==='pvp'&&CFG.stake===0)?1:CFG.stake;POOL_RATE=0.95;
    if(CFG.mode==='solo'){
        BOTS=[];
        document.getElementById('pool-area-wrap').style.display='none';
        document.getElementById('game-mode-label').textContent='EROSION';
        document.getElementById('col-btns').style.display='grid';
    }else if(CFG.mode==='bet'){
        calcOdds();
        BOTS=BET_FIGHTERS;
        document.getElementById('pool-area-wrap').style.display='flex';
        document.getElementById('game-mode-label').textContent='Bet&Wet';
        document.getElementById('col-btns').style.display='none';
        DROP_COST=CFG.stake>0?CFG.stake:1;
    }else{
        BOTS=BOT_POOL.slice(0,CFG.numBots);
        document.getElementById('pool-area-wrap').style.display='flex';
        document.getElementById('game-mode-label').textContent='NOISORE';
        document.getElementById('col-btns').style.display='grid';
    }
    document.getElementById('info-left').textContent=COLS+'\u00d7'+ROWS+(ROTATE?' rotate':'')+' - stone 1-'+MAX_H;
    document.getElementById('info-right').textContent=DROP_COST>0?(DROP_COST.toFixed(2)+' USDT/drop'):'free play';
    document.getElementById('grid').style.gridTemplateColumns='repeat('+COLS+',1fr)';
    document.getElementById('col-btns').style.gridTemplateColumns='repeat('+COLS+',1fr)';
    initGame();
    if(CFG.mode==='bet') betRound();
}
function backToLobby(){document.getElementById('game').style.display='none';document.getElementById('lobby').style.display='block';animating=false;}
// === GAME STATE ===
var COLS=6,ROWS=6,MAX_H=10,MAX_DROP=10,DROP_COST=0,POOL_RATE=0.95,ANIM_DELAY=200;
var ROTATE=true,BOTS=[];
var grid=[],pool=0,balance=100,dropNum=0,roundNum=1,animating=false,currentDrop=0,turnPlayers=[];
var TAG_POS=[{top:'1px',left:'2px'},{top:'1px',right:'2px'},{bottom:'1px',left:'2px'},{bottom:'1px',right:'2px'},{top:'1px',left:'50%',tx:'-50%'},{bottom:'1px',left:'50%',tx:'-50%'},{top:'50%',left:'1px',ty:'-50%'},{top:'50%',right:'1px',ty:'-50%'},{top:'30%',left:'2px'},{top:'30%',right:'2px'},{bottom:'30%',left:'2px'},{bottom:'30%',right:'2px'}];
function randH(){return 1+Math.floor(Math.random()*MAX_H);}
function initGrid(){grid=[];for(var r=0;r<ROWS;r++){grid[r]=[];for(var c=0;c<COLS;c++)grid[r][c]=randH();}}
function newRound(){clearPowerTags();initGrid();pool=0;dropNum=0;roundNum++;document.getElementById('players-list').innerHTML='';updateUI();renderGrid();rollDrop();setColBtnsDisabled(false);}
function initGame(){initGrid();pool=0;balance=100;dropNum=0;roundNum=1;animating=false;updateUI();renderGrid();renderColBtns();rollDrop();}
function renderGrid(){var el=document.getElementById('grid');el.innerHTML='';for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){var cell=document.createElement('div');cell.className='cell h'+grid[r][c];cell.id='cell-'+r+'-'+c;cell.textContent=grid[r][c]>0?grid[r][c]:'';el.appendChild(cell);}}
function updateCell(r,c){var cell=document.getElementById('cell-'+r+'-'+c);var tags=cell.querySelectorAll('.power-tag');cell.className='cell h'+grid[r][c];cell.textContent=grid[r][c]>0?grid[r][c]:'';for(var i=0;i<tags.length;i++)cell.appendChild(tags[i]);}
function showPowerTag(r,c,remaining,color,playerIdx){var cell=document.getElementById('cell-'+r+'-'+c);var tag=document.createElement('span');tag.className='power-tag';var pos=TAG_POS[playerIdx%TAG_POS.length];if(pos.top)tag.style.top=pos.top;if(pos.bottom)tag.style.bottom=pos.bottom;if(pos.left)tag.style.left=pos.left;if(pos.right)tag.style.right=pos.right;var tf='';if(pos.tx)tf+='translateX('+pos.tx+')';if(pos.ty)tf+='translateY('+pos.ty+')';if(tf)tag.style.transform=tf;tag.style.color=color;tag.textContent=remaining;cell.appendChild(tag);}
function clearPowerTags(){document.querySelectorAll('.power-tag').forEach(function(el){el.remove();});}
function renderColBtns(){var el=document.getElementById('col-btns');el.innerHTML='';for(var c=0;c<COLS;c++){var btn=document.createElement('div');btn.className='col-btn';btn.textContent='\uD83D\uDCA7';btn.onclick=(function(col){return function(){playDrop(col);};})(c);el.appendChild(btn);}}
function updateUI(){document.getElementById('pool-value').textContent=pool.toFixed(2);document.getElementById('balance').textContent=balance.toFixed(2);document.getElementById('drop-num').textContent=dropNum;document.getElementById('round-num').textContent=roundNum;}
function renderPlayersList(players){turnPlayers=players;var el=document.getElementById('players-list');el.innerHTML='';for(var k=0;k<players.length;k++){var row=document.createElement('div');row.className='player-row';row.id='p-row-'+k;var ord=document.createElement('span');ord.className='p-order';ord.textContent=(k+1)+'.';var nm=document.createElement('span');nm.className='p-name';nm.textContent=players[k].name;nm.style.color=players[k].color;var dp=document.createElement('span');dp.className='p-drop';dp.id='p-drop-'+k;dp.style.color=players[k].color;var rem=document.createElement('span');rem.className='p-remaining';rem.id='p-rem-'+k;row.appendChild(ord);row.appendChild(nm);row.appendChild(dp);row.appendChild(rem);el.appendChild(row);}}
function setPlayerActive(idx){for(var k=0;k<turnPlayers.length;k++){document.getElementById('p-row-'+k).classList.remove('active','done');}document.getElementById('p-row-'+idx).classList.add('active');}
function setPlayerDrop(idx,dp){var el=document.getElementById('p-drop-'+idx);el.textContent=dp;el.classList.add('show');}
function setPlayerRemaining(idx,rem){document.getElementById('p-rem-'+idx).textContent='\u2192'+rem;}
function setPlayerDone(idx){document.getElementById('p-row-'+idx).classList.remove('active');document.getElementById('p-row-'+idx).classList.add('done');}
function rollDrop(){currentDrop=randDrop();var el=document.getElementById('drop-power');el.textContent=currentDrop;el.className='drop-power-value dp'+currentDrop;document.getElementById('drop-who').innerHTML='YOUR<br>DROP';document.getElementById('drop-who').style.color='#d4d4d8';document.getElementById('drop-remaining').innerHTML='';document.getElementById('payout-area').innerHTML='<span style="color:#f59e0b">choose a column \u2191</span>';}
function showDropInfo(who,color,power,remaining,spent){document.getElementById('drop-who').innerHTML=who;document.getElementById('drop-who').style.color=color;var dpEl=document.getElementById('drop-power');dpEl.textContent=power;dpEl.className='drop-power-value dp'+power;var remEl=document.getElementById('drop-remaining');if(spent>0)remEl.innerHTML='\u2212'+spent+' \u2192 <span class="rem">'+remaining+'</span>';else remEl.innerHTML='<span class="rem">'+remaining+'</span>';}
function setColBtnsDisabled(d){document.querySelectorAll('.col-btn').forEach(function(b){if(d)b.classList.add('disabled');else b.classList.remove('disabled');});}
function waitForRotate(){return new Promise(function(resolve){var timer=setTimeout(function(){document.getElementById('grid').onclick=null;resolve();},5000);document.getElementById('grid').onclick=function(){clearTimeout(timer);document.getElementById('grid').onclick=null;resolve();};});}
async function doRotation(){
    document.getElementById('rotate-ind').textContent='\u21bb 5s or click grid';
    document.getElementById('rotate-ind').classList.add('show');
    await waitForRotate();
    rotateGridCW();if(hasChannel()){fillRowIfChannel();}
    clearPowerTags();renderGrid();
    document.getElementById('rotate-ind').textContent='\u21bb rotated 90\u00b0';
    await sleep(800);
    document.getElementById('rotate-ind').classList.remove('show');
}
async function doRotationAuto(){
    rotateGridCW();if(hasChannel()){fillRowIfChannel();}
    clearPowerTags();renderGrid();
    document.getElementById('rotate-ind').textContent='\u21bb rotated 90\u00b0';
    document.getElementById('rotate-ind').classList.add('show');
    await sleep(600);
    document.getElementById('rotate-ind').classList.remove('show');
}
async function animateDrop(col,dropPower,who,color,playerIdx){
    var power=dropPower,c=col,washed=0;
    showDropInfo(who,color,dropPower,power,0);if(BOTS.length>0){setPlayerActive(playerIdx);setPlayerDrop(playerIdx,dropPower);}
    for(var row=0;row<ROWS&&power>0;row++){
        var cell=document.getElementById('cell-'+row+'-'+c);
        cell.classList.remove('water-hit');void cell.offsetWidth;cell.classList.add('water-hit');
        if(grid[row][c]===0){showDropInfo(who,color,dropPower,power,0);showPowerTag(row,c,power,color,playerIdx);if(BOTS.length>0)setPlayerRemaining(playerIdx,power);await sleep(ANIM_DELAY/2);if(row<ROWS-1)c=chooseNext(row,c);continue;}
        var stoneH=grid[row][c];
        if(power>=stoneH){power-=stoneH;grid[row][c]=0;washed++;updateCell(row,c);cell.classList.add('washed');showDropInfo(who,color,dropPower,power,stoneH);showPowerTag(row,c,power,color,playerIdx);if(BOTS.length>0)setPlayerRemaining(playerIdx,power);
        }else{grid[row][c]-=power;showDropInfo(who,color,dropPower,0,power);showPowerTag(row,c,0,color,playerIdx);if(BOTS.length>0)setPlayerRemaining(playerIdx,0);power=0;updateCell(row,c);}
        await sleep(ANIM_DELAY);if(power>0&&row<ROWS-1)c=chooseNext(row,c);
    }
    if(BOTS.length>0)setPlayerDone(playerIdx);return washed;
}
async function checkWin(winner,winColor){
    var ch=findChannelCells();var keys=Object.keys(ch);
    if(keys.length===0)return false;
    for(var i=0;i<keys.length;i++){var parts=keys[i].split('-');var cell=document.getElementById('cell-'+parts[0]+'-'+parts[1]);cell.style.background=winColor;cell.style.border='3px solid '+winColor;cell.style.boxShadow='0 0 16px '+winColor;var tags=cell.querySelectorAll('.power-tag');for(var t=0;t<tags.length;t++){tags[t].style.color='#000';tags[t].style.textShadow='0 0 3px #fff, 0 0 6px #fff';}}
    var flash=document.getElementById('channel-flash');flash.classList.add('show');
    await sleep(1500);flash.classList.remove('show');
    if(winner==='YOU')balance+=pool;
    updateUI();
    var label=winner+(winner==='YOU'?' WIN':' WINS');
    document.getElementById('payout-area').innerHTML='<div style="margin-top:4px"><span style="font-family:Archivo Black,sans-serif;font-size:18px;color:'+winColor+'">'+label+'</span><br>'+(pool>0?'<span style="font-family:Archivo Black,sans-serif;font-size:28px;color:#fff">'+pool.toFixed(2)+' USDT</span><br>':'')+'<button onclick="newRound()" style="margin-top:10px;background:'+winColor+';color:#0a0a0f;font-family:Archivo Black,sans-serif;font-size:13px;padding:8px 28px;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px">NEXT ROUND</button></div>';
    animating=false;setColBtnsDisabled(true);return true;
}
// === SOLO & PVP ===
async function playDrop(startCol){
    if(animating)return;animating=true;setColBtnsDisabled(true);
    if(DROP_COST>0&&balance<DROP_COST){document.getElementById('payout-area').innerHTML='<span style="color:#f66">insufficient balance</span>';animating=false;setColBtnsDisabled(false);return;}
    if(BOTS.length===0){
        clearPowerTags();
        if(DROP_COST>0)balance-=DROP_COST;
        pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();
        await animateDrop(startCol,currentDrop,'YOU','#f59e0b',0);
        if(await checkWin('YOU','#f59e0b'))return;
        if(ROTATE)await doRotation();
        rollDrop();animating=false;setColBtnsDisabled(false);
        return;
    }
    var players=[{name:'YOU',color:'#f59e0b',col:startCol,dp:currentDrop,isPlayer:true}];
    for(var b=0;b<BOTS.length;b++){var botCol=BOTS[b].smart?pickLight():Math.floor(Math.random()*COLS);players.push({name:BOTS[b].name,color:BOTS[b].color,col:botCol,dp:randDrop(),isPlayer:false});}
    for(var i=players.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=players[i];players[i]=players[j];players[j]=tmp;}
    renderPlayersList(players);clearPowerTags();
    for(var t=0;t<players.length;t++){
        var p=players[t];
        if(p.isPlayer&&DROP_COST>0)balance-=DROP_COST;
        pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();
        await animateDrop(p.col,p.dp,p.name,p.color,t);
        if(await checkWin(p.name,p.color))return;
        if(t<players.length-1)await sleep(400);
    }
    if(ROTATE)await doRotation();
    rollDrop();animating=false;setColBtnsDisabled(false);
}
// === BET&WET ===
var BET_BETS={},BET_STAKE=0;
async function betRound(){
    BET_BETS={};
    for(var k in CFG.bets)BET_BETS[k]=CFG.bets[k];
    BET_STAKE=DROP_COST;
    var totalBets=0;for(var k2 in BET_BETS)totalBets+=BET_BETS[k2];
    if(totalBets===0){document.getElementById('payout-area').innerHTML='<span style="color:#f66">place at least one bet (right-click)</span>';return;}
    balance-=totalBets*BET_STAKE;
    pool=totalBets*BET_STAKE*6;dropNum=0;
    updateUI();
    var betList=[];for(var k3 in BET_BETS)betList.push(k3+'\u00d7'+BET_BETS[k3]);
    var fighters=BET_FIGHTERS.map(function(f,i){return{name:f.name,color:f.color,strategy:f.name};});
    renderPlayersList(fighters);
    document.getElementById('payout-area').innerHTML='<span style="color:#f59e0b">your bets: '+betList.join(', ')+' \u2014 watching...</span>';
    animating=true;
    for(var cycle=0;cycle<100;cycle++){
        var order=[];for(var i=0;i<fighters.length;i++)order.push(i);
        for(var i2=order.length-1;i2>0;i2--){var j=Math.floor(Math.random()*(i2+1));var tmp=order[i2];order[i2]=order[j];order[j]=tmp;}
        clearPowerTags();
        for(var t=0;t<order.length;t++){
            var idx=order[t];
            var f=fighters[idx];
            var dp=randDrop();
            var col=STRATEGY_PICK[f.strategy](dp);
            dropNum++;updateUI();
            await animateDrop(col,dp,f.name,f.color,idx);
            var ch=findChannelCells();var keys=Object.keys(ch);
            if(keys.length>0){
                for(var ci=0;ci<keys.length;ci++){var parts=keys[ci].split('-');var cell=document.getElementById('cell-'+parts[0]+'-'+parts[1]);cell.style.background=f.color;cell.style.border='3px solid '+f.color;cell.style.boxShadow='0 0 16px '+f.color;var tags=cell.querySelectorAll('.power-tag');for(var tt=0;tt<tags.length;tt++){tags[tt].style.color='#000';tags[tt].style.textShadow='0 0 3px #fff, 0 0 6px #fff';}}
                var flash=document.getElementById('channel-flash');flash.classList.add('show');
                await sleep(1500);flash.classList.remove('show');
                var won=BET_BETS[f.name]&&BET_BETS[f.name]>0;
                var fdata=BET_FIGHTERS.filter(function(x){return x.name===f.name;})[0];
                var payout=0;
                if(won){payout=BET_BETS[f.name]*BET_STAKE*fdata.odds;balance+=payout;}
                updateUI();
                var msg=won?'<span style="color:#22c55e;font-family:Archivo Black,sans-serif;font-size:20px">YOU WIN \u00d7'+fdata.odds+' \u00d7'+BET_BETS[f.name]+'</span><br><span style="font-family:Archivo Black,sans-serif;font-size:28px;color:#fff">+'+payout.toFixed(2)+' USDT</span>':'<span style="color:#f66;font-family:Archivo Black,sans-serif;font-size:16px">'+f.name+' WINS</span><br><span style="color:#d4d4d8;font-size:13px">no bet on '+f.name+'</span>';
                document.getElementById('payout-area').innerHTML='<div style="margin-top:4px">'+msg+'<br><button onclick="newBetRound()" style="margin-top:10px;background:'+f.color+';color:#0a0a0f;font-family:Archivo Black,sans-serif;font-size:13px;padding:8px 28px;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px">NEXT RACE</button></div>';
                animating=false;return;
            }
            if(t<order.length-1)await sleep(150);
        }
        if(ROTATE)await doRotationAuto();
    }
}
function newBetRound(){clearPowerTags();initGrid();pool=0;dropNum=0;roundNum++;document.getElementById('players-list').innerHTML='';updateUI();renderGrid();betRound();}
calcOdds();
</script>
