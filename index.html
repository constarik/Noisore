<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NOISORE v0.3</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TRP1QX4878"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TRP1QX4878');</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#e4e4e7;font-family:'JetBrains Mono',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#game-container{width:400px;padding:16px;position:relative;}
h1{font-family:'Archivo Black',sans-serif;font-size:28px;color:#f59e0b;text-align:center;letter-spacing:6px;margin-bottom:2px;}
.version{text-align:center;font-size:10px;color:#555;margin-bottom:10px;}
.stats{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:#71717a;}
.stats .val{color:#e4e4e7;font-weight:700;}
.pool-area{text-align:center;margin-bottom:10px;padding:12px;background:#12121a;border:1px solid #1e1e2e;border-radius:10px;}
.pool-label{font-size:11px;color:#71717a;letter-spacing:2px;text-transform:uppercase;}
.pool-value{font-family:'Archivo Black',sans-serif;font-size:38px;color:#f59e0b;line-height:1.2;}
.pool-unit{font-size:14px;color:#71717a;}
.drop-info{text-align:center;margin-bottom:8px;min-height:50px;display:flex;align-items:center;justify-content:center;gap:10px;}
.drop-who{font-size:11px;color:#71717a;min-width:50px;text-align:right;}
.drop-power-value{font-family:'Archivo Black',sans-serif;font-size:32px;line-height:1;min-width:44px;text-align:center;}
.drop-remaining{font-size:14px;color:#71717a;min-width:80px;text-align:left;}
.drop-remaining .rem{color:#f59e0b;font-weight:700;}
.dp1{color:#555;}.dp2{color:#6a8;}.dp3{color:#4ad;}.dp4{color:#c82;}.dp5{color:#d44;}
.dp6{color:#d26;}.dp7{color:#a3d;}.dp8{color:#63e;}.dp9{color:#24f;}.dp10{color:#e22;font-size:36px;text-shadow:0 0 12px rgba(224,16,16,0.4);}
.col-selectors{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:4px;padding:0 2px;}
.col-btn{background:#1a1a2e;border:2px solid #2a2a4a;border-radius:6px 6px 0 0;color:#f59e0b;font-size:18px;font-weight:700;padding:8px 0;cursor:pointer;transition:all 0.15s;text-align:center;}
.col-btn:hover{background:#2a2a4a;border-color:#f59e0b;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,0.2);}
.col-btn:active{transform:translateY(0);}.col-btn.disabled{opacity:0.3;pointer-events:none;}
.grid-wrap{padding:3px;background:#12121a;border-radius:6px;border:1px solid #1e1e2e;}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;}
.cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;transition:all 0.15s;position:relative;overflow:hidden;}
.cell.h10{background:#6b4226;color:#fff;border:2px solid #7d4e2e;}.cell.h9{background:#6e4a2a;color:#fff;border:2px solid #80522e;}
.cell.h8{background:#72522e;color:#fff;border:2px solid #845a32;}.cell.h7{background:#765a34;color:#fff;border:2px solid #886238;}
.cell.h6{background:#7a623a;color:#fff;border:2px solid #8c6a3e;}.cell.h5{background:#7e6a40;color:#fff;border:2px solid #907246;}
.cell.h4{background:#88784e;color:#fff;border:2px solid #9a8456;}.cell.h3{background:#92865c;color:#fff;border:2px solid #a49264;}
.cell.h2{background:#a89878;color:#1a1a2e;border:2px solid #b8a888;}.cell.h1{background:#c0b090;color:#1a1a2e;border:2px solid #d0c0a0;}
.cell.h0{background:#1a1a2e;color:transparent;border:2px solid #2a2a4a;}
.cell.water-hit{animation:waterHit 0.25s ease;}
@keyframes waterHit{0%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:inset 0 0 15px 5px rgba(245,158,11,0.5);}100%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0);}}
.cell.washed{animation:washAway 0.35s ease;}
@keyframes washAway{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:0.6;background:#f59e0b;}100%{transform:scale(1);opacity:1;}}
.cell.channel-glow{background:#f59e0b !important;border:3px solid #fbbf24 !important;box-shadow:0 0 16px rgba(245,158,11,0.8) !important;animation:chPulse 0.4s ease infinite alternate !important;overflow:visible !important;z-index:10;}
@keyframes chPulse{0%{box-shadow:0 0 12px rgba(245,158,11,0.6);}100%{box-shadow:0 0 24px rgba(245,158,11,1.0);}}
.win-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,0.92);z-index:50;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;}
.win-overlay.show{display:flex;}
.win-title{font-family:'Archivo Black',sans-serif;font-size:20px;color:#f59e0b;letter-spacing:3px;margin-bottom:4px;}
.win-who{font-family:'Archivo Black',sans-serif;font-size:16px;margin-bottom:8px;}
.win-amount{font-family:'Archivo Black',sans-serif;font-size:52px;color:#fff;}
.win-sub{font-size:12px;color:#71717a;margin-top:4px;}
.win-btn{margin-top:20px;background:#f59e0b;color:#0a0a0f;font-family:'Archivo Black',sans-serif;font-size:14px;padding:10px 32px;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px;transition:all 0.15s;}
.win-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(245,158,11,0.4);}
.payout-area{min-height:28px;margin-top:8px;text-align:center;font-size:13px;color:#71717a;}
.info-bar{display:flex;justify-content:space-between;margin-top:10px;font-size:10px;color:#555;border-top:1px solid #1e1e2e;padding-top:6px;}
.channel-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,0.12) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:100;}
.channel-flash.show{opacity:1;}
</style>
</head>
<body>
<div id="game-container">
    <h1>NOISORE</h1>
    <div class="version">v0.3</div>
    <div class="stats">
        <div>BALANCE <span class="val" id="balance">100.00</span></div>
        <div>DROPS <span class="val" id="drop-num">0</span></div>
        <div>ROUND <span class="val" id="round-num">1</span></div>
    </div>
    <div class="pool-area">
        <div class="pool-label">Prize Pool</div>
        <div class="pool-value" id="pool-value">0.00</div>
        <div class="pool-unit">USDT</div>
    </div>
    <div class="drop-info">
        <div class="drop-who" id="drop-who">YOUR<br>DROP</div>
        <div class="drop-power-value" id="drop-power">&mdash;</div>
        <div class="drop-remaining" id="drop-remaining"></div>
    </div>
    <div class="col-selectors" id="col-btns"></div>
    <div class="grid-wrap" style="position:relative;">
        <div class="grid" id="grid"></div>
        <div class="win-overlay" id="win-overlay">
            <div class="win-title">CHANNEL CARVED</div>
            <div class="win-who" id="win-who">YOU WIN</div>
            <div class="win-amount" id="win-amount">0</div>
            <div class="win-sub">USDT WON</div>
            <div class="win-btn" onclick="newRound()">NEXT ROUND</div>
        </div>
    </div>
    <div class="payout-area" id="payout-area"></div>
    <div class="info-bar">
        <div>6x5 · stone 1-10 · drop 1-10</div>
        <div>1 drop = 1 USDT · 95% to pool</div>
    </div>
</div>
<div class="channel-flash" id="channel-flash"></div>
<script>
const COLS=6,ROWS=5,MAX_H=10,MAX_DROP=10,DROP_COST=1,POOL_RATE=0.95,ANIM_DELAY=200;
const BOTS=[{name:'Axel',color:'#4ad'},{name:'Kira',color:'#d4a'}];
let grid=[],pool=0,balance=100,dropNum=0,roundNum=1,animating=false,currentDrop=0;

function randH(){return 1+Math.floor(Math.random()*MAX_H);}
function randDrop(){return 1+Math.floor(Math.random()*MAX_DROP);}
function initGrid(){grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=randH();}}

function newRound(){
    document.getElementById('win-overlay').classList.remove('show');
    initGrid();pool=0;dropNum=0;roundNum++;
    updateUI();renderGrid();rollDrop();setColBtnsDisabled(false);
}

function initGame(){
    initGrid();pool=0;balance=100;dropNum=0;roundNum=1;animating=false;
    updateUI();renderGrid();renderColBtns();rollDrop();
}

function renderGrid(){
    const el=document.getElementById('grid');el.innerHTML='';
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
        const cell=document.createElement('div');
        cell.className='cell h'+grid[r][c];cell.id='cell-'+r+'-'+c;
        cell.textContent=grid[r][c]>0?grid[r][c]:'';
        el.appendChild(cell);
    }
}

function updateCell(r,c){
    const cell=document.getElementById('cell-'+r+'-'+c);
    cell.className='cell h'+grid[r][c];
    cell.textContent=grid[r][c]>0?grid[r][c]:'';
}

function renderColBtns(){
    const el=document.getElementById('col-btns');el.innerHTML='';
    for(let c=0;c<COLS;c++){
        const btn=document.createElement('div');btn.className='col-btn';
        btn.textContent='\uD83D\uDCA7';btn.onclick=(function(col){return function(){playDrop(col);};})(c);
        el.appendChild(btn);
    }
}

function updateUI(){
    document.getElementById('pool-value').textContent=pool.toFixed(2);
    document.getElementById('balance').textContent=balance.toFixed(2);
    document.getElementById('drop-num').textContent=dropNum;
    document.getElementById('round-num').textContent=roundNum;
}

function rollDrop(){
    currentDrop=randDrop();
    const el=document.getElementById('drop-power');
    el.textContent=currentDrop;el.className='drop-power-value dp'+currentDrop;
    document.getElementById('drop-who').innerHTML='YOUR<br>DROP';
    document.getElementById('drop-who').style.color='#71717a';
    document.getElementById('drop-remaining').innerHTML='';
    document.getElementById('payout-area').innerHTML='<span style="color:#555">choose a column \u2191</span>';
}

function showDropInfo(who,color,power,remaining,spent){
    document.getElementById('drop-who').innerHTML=who;
    document.getElementById('drop-who').style.color=color;
    const dpEl=document.getElementById('drop-power');
    dpEl.textContent=power;dpEl.className='drop-power-value dp'+power;
    const remEl=document.getElementById('drop-remaining');
    if(spent>0) remEl.innerHTML='\u2212'+spent+' \u2192 <span class="rem">'+remaining+'</span>';
    else remEl.innerHTML='<span class="rem">'+remaining+'</span>';
}

function setColBtnsDisabled(d){
    document.querySelectorAll('.col-btn').forEach(function(b){
        if(d)b.classList.add('disabled');else b.classList.remove('disabled');
    });
}

function chooseNext(row,col){
    var cands=[];
    for(var dc=-1;dc<=1;dc++){var nc=col+dc;if(nc>=0&&nc<COLS)cands.push({c:nc,h:grid[row+1][nc]});}
    var nz=cands.filter(function(x){return x.h>0;});
    if(nz.length===0)return cands[Math.floor(Math.random()*cands.length)].c;
    var w=nz.map(function(x){return 1/x.h;});
    var tw=w.reduce(function(a,b){return a+b;},0);
    var r=Math.random()*tw;
    for(var i=0;i<nz.length;i++){r-=w[i];if(r<=0)return nz[i].c;}
    return nz[nz.length-1].c;
}

function hasChannel(){
    for(var c=0;c<COLS;c++){if(grid[0][c]===0&&dfs(0,c,{}))return true;}
    return false;
}

function dfs(row,col,vis){
    var k=row+'-'+col;if(vis[k])return false;vis[k]=true;
    if(grid[row][col]!==0)return false;
    if(row===ROWS-1)return true;
    for(var dc=-1;dc<=1;dc++){var nc=col+dc;if(nc>=0&&nc<COLS&&dfs(row+1,nc,vis))return true;}
    return false;
}

function findChannelCells(){
    var ch={};
    for(var c=0;c<COLS;c++){if(grid[0][c]===0){var path=[];if(dfsCollect(0,c,{},path)){for(var i=0;i<path.length;i++)ch[path[i]]=true;}}}
    return ch;
}

function dfsCollect(row,col,vis,path){
    var k=row+'-'+col;if(vis[k])return false;vis[k]=true;
    if(grid[row][col]!==0)return false;path.push(k);
    if(row===ROWS-1)return true;
    var found=false;
    for(var dc=-1;dc<=1;dc++){var nc=col+dc;if(nc>=0&&nc<COLS){var before=path.length;if(dfsCollect(row+1,nc,vis,path))found=true;else path.length=before;}}
    if(!found)path.pop();return found;
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function animateDrop(col,dropPower,who,color){
    var power=dropPower,c=col,washed=0;
    showDropInfo(who,color,dropPower,power,0);
    for(var row=0;row<ROWS&&power>0;row++){
        var cell=document.getElementById('cell-'+row+'-'+c);
        cell.classList.remove('water-hit');void cell.offsetWidth;cell.classList.add('water-hit');
        if(grid[row][c]===0){
            showDropInfo(who,color,dropPower,power,0);
            await sleep(ANIM_DELAY/2);
            if(row<ROWS-1)c=chooseNext(row,c);
            continue;
        }
        var stoneH=grid[row][c];
        if(power>=stoneH){
            power-=stoneH;grid[row][c]=0;washed++;
            updateCell(row,c);cell.classList.add('washed');
            showDropInfo(who,color,dropPower,power,stoneH);
        } else {
            grid[row][c]-=power;
            showDropInfo(who,color,dropPower,0,power);
            power=0;
            updateCell(row,c);
        }
        await sleep(ANIM_DELAY);
        if(power>0&&row<ROWS-1)c=chooseNext(row,c);
    }
    return washed;
}

async function checkWin(winner,winColor){
    var ch=findChannelCells();var keys=Object.keys(ch);
    if(keys.length===0)return false;
    for(var i=0;i<keys.length;i++){
        var parts=keys[i].split('-');
        document.getElementById('cell-'+parts[0]+'-'+parts[1]).classList.add('channel-glow');
    }
    var flash=document.getElementById('channel-flash');flash.classList.add('show');
    await sleep(1500);flash.classList.remove('show');
    if(winner==='YOU')balance+=pool;
    document.getElementById('win-amount').textContent=pool.toFixed(2);
    var whoEl=document.getElementById('win-who');
    whoEl.textContent=winner+(winner==='YOU'?' WIN':' WINS');
    whoEl.style.color=winColor;
    document.getElementById('win-overlay').classList.add('show');
    updateUI();animating=false;setColBtnsDisabled(true);
    return true;
}

async function playDrop(startCol){
    if(animating)return;animating=true;setColBtnsDisabled(true);
    if(balance<DROP_COST){
        document.getElementById('payout-area').innerHTML='<span style="color:#f55">insufficient balance</span>';
        animating=false;setColBtnsDisabled(false);return;
    }
    balance-=DROP_COST;pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();
    var washed=await animateDrop(startCol,currentDrop,'YOU','#f59e0b');
    if(washed>0)document.getElementById('payout-area').innerHTML='<span style="color:#f59e0b">'+washed+' stone'+(washed>1?'s':'')+' eroded</span>';
    else document.getElementById('payout-area').innerHTML='<span style="color:#555">no erosion</span>';
    if(await checkWin('YOU','#f59e0b'))return;

    // Bot turns
    for(var b=0;b<BOTS.length;b++){
        await sleep(400);
        var bot=BOTS[b];var dp=randDrop();var col=Math.floor(Math.random()*COLS);
        pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();
        await animateDrop(col,dp,bot.name,bot.color);
        if(await checkWin(bot.name,bot.color))return;
    }

    rollDrop();animating=false;setColBtnsDisabled(false);
}

initGame();
</script>
</body>
</html>
