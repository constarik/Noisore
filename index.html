<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a14;color:#e4e4e7;font-family:'JetBrains Mono',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow-x:hidden;}
#app{width:420px;padding:16px;position:relative;z-index:1;background:rgba(10,10,20,0.75);border-radius:12px;margin:8px 0;}
h1{font-family:'Archivo Black',sans-serif;font-size:28px;color:#f59e0b;text-align:center;letter-spacing:6px;margin-bottom:2px;text-shadow:0 2px 8px rgba(0,0,0,0.5);}
.version{text-align:center;font-size:10px;color:#f59e0b;margin-bottom:14px;}
#lobby{text-align:center;}
.lobby-section{margin-bottom:14px;}
.lobby-label{font-size:11px;color:#d4d4d8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.lobby-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.lbtn{background:#12121a;border:2px solid #2a2a4a;border-radius:8px;color:#d4d4d8;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:10px 16px;cursor:pointer;transition:all 0.15s;min-width:60px;}
.lbtn:hover{border-color:#f59e0b;color:#f59e0b;}
.lbtn.active{background:#f59e0b;color:#0a0a0f;border-color:#f59e0b;}
.lbtn.disabled{opacity:0.3;pointer-events:none;}
.play-btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0a0f;font-family:'Archivo Black',sans-serif;font-size:18px;letter-spacing:4px;padding:14px 48px;border:none;border-radius:10px;cursor:pointer;margin-top:16px;transition:all 0.2s;}
.play-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,0.3);}
.lobby-hint{font-size:11px;color:#b0b0b8;margin-top:8px;}
#game{display:none;}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.game-title{font-family:'Archivo Black',sans-serif;font-size:16px;color:#f59e0b;letter-spacing:3px;}
.back-btn{background:none;border:1px solid #2a2a4a;color:#d4d4d8;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;}
.back-btn:hover{border-color:#f59e0b;color:#f59e0b;}
.stats{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:#d4d4d8;}
.stats .val{color:#e4e4e7;font-weight:700;}
.pool-area{display:flex;margin-bottom:10px;padding:12px;background:#12121a;border:1px solid #1e1e2e;border-radius:10px;gap:12px;align-items:center;}
.pool-left{flex:1;}.pool-label{font-size:11px;color:#d4d4d8;letter-spacing:2px;text-transform:uppercase;}
.pool-value{font-family:'Archivo Black',sans-serif;font-size:34px;color:#f59e0b;line-height:1.2;}.pool-unit{font-size:12px;color:#d4d4d8;}
.players-list{display:flex;flex-direction:column;gap:4px;min-width:110px;}
.players-list.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;min-width:220px;}
.player-row{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;transition:all 0.2s;}
.player-row .p-order{font-size:10px;color:#f59e0b;min-width:14px;}.player-row .p-name{min-width:40px;}
.player-row .p-drop{font-family:'Archivo Black',sans-serif;font-size:14px;min-width:20px;text-align:center;opacity:0;transition:opacity 0.3s;}
.player-row .p-drop.show{opacity:1;}.player-row .p-remaining{font-size:10px;color:#f59e0b;min-width:24px;}
.player-row.active{transform:scale(1.05);}.player-row.done{opacity:0.7;}
.drop-info{text-align:center;margin-bottom:8px;min-height:44px;display:flex;align-items:center;justify-content:center;gap:10px;}
.drop-who{font-size:11px;color:#d4d4d8;min-width:50px;text-align:right;}
.drop-power-value{font-family:'Archivo Black',sans-serif;font-size:32px;line-height:1;min-width:44px;text-align:center;}
.drop-remaining{font-size:14px;color:#d4d4d8;min-width:80px;text-align:left;}.drop-remaining .rem{color:#f59e0b;font-weight:700;}
.dp1{color:#f59e0b;}.dp2{color:#6a8;}.dp3{color:#4ad;}.dp4{color:#c82;}.dp5{color:#d44;}
.dp6{color:#d26;}.dp7{color:#a3d;}.dp8{color:#63e;}.dp9{color:#24f;}.dp10{color:#e22;font-size:36px;text-shadow:0 0 12px rgba(224,16,16,0.4);}
.col-selectors{display:grid;gap:4px;margin-bottom:4px;padding:0 2px;}
.col-btn{background:#1a1a2e;border:2px solid #2a2a4a;border-radius:6px 6px 0 0;color:#f59e0b;font-size:18px;font-weight:700;padding:8px 0;cursor:pointer;transition:all 0.15s;text-align:center;}
.col-btn:hover{background:#2a2a4a;border-color:#f59e0b;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,0.2);}
.col-btn:active{transform:translateY(0);}.col-btn.disabled{opacity:0.3;pointer-events:none;}
.grid-wrap{padding:3px;border-radius:6px;border:1px solid #2a2a3a;background:rgba(10,10,20,0.85);box-shadow:inset 0 0 30px rgba(0,0,0,0.6),0 4px 20px rgba(0,0,0,0.5);}
.grid{display:grid;gap:3px;}
.cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;transition:all 0.15s;position:relative;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
.cell.h10{background:radial-gradient(ellipse at 35% 30%,#8b5a30,#5a3218);color:#fff;border:2px solid #4a2a12;box-shadow:inset 0 -3px 6px rgba(0,0,0,0.4),inset 0 2px 4px rgba(255,255,255,0.1);}
.cell.h9{background:radial-gradient(ellipse at 35% 30%,#8f5e34,#5e361c);color:#fff;border:2px solid #4e2e16;box-shadow:inset 0 -3px 6px rgba(0,0,0,0.4),inset 0 2px 4px rgba(255,255,255,0.1);}
.cell.h8{background:radial-gradient(ellipse at 35% 30%,#936238,#624020);color:#fff;border:2px solid #523018;box-shadow:inset 0 -3px 6px rgba(0,0,0,0.35),inset 0 2px 4px rgba(255,255,255,0.1);}
.cell.h7{background:radial-gradient(ellipse at 35% 30%,#97683e,#664624);color:#fff;border:2px solid #56361c;box-shadow:inset 0 -3px 6px rgba(0,0,0,0.35),inset 0 2px 4px rgba(255,255,255,0.1);}
.cell.h6{background:radial-gradient(ellipse at 35% 30%,#9b7044,#6a4c28);color:#fff;border:2px solid #5a3c20;box-shadow:inset 0 -3px 5px rgba(0,0,0,0.3),inset 0 2px 3px rgba(255,255,255,0.12);}
.cell.h5{background:radial-gradient(ellipse at 35% 30%,#a07848,#6e522c);color:#fff;border:2px solid #5e4224;box-shadow:inset 0 -3px 5px rgba(0,0,0,0.3),inset 0 2px 3px rgba(255,255,255,0.12);}
.cell.h4{background:radial-gradient(ellipse at 35% 30%,#a88856,#786238);color:#fff;border:2px solid #685230;box-shadow:inset 0 -2px 5px rgba(0,0,0,0.25),inset 0 2px 3px rgba(255,255,255,0.15);}
.cell.h3{background:radial-gradient(ellipse at 35% 30%,#b09868,#887248);color:#fff;border:2px solid #786240;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.2),inset 0 2px 3px rgba(255,255,255,0.15);}
.cell.h2{background:radial-gradient(ellipse at 35% 30%,#c0aa82,#988260);color:#1a1a2e;border:2px solid #887250;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.15),inset 0 2px 3px rgba(255,255,255,0.2);}
.cell.h1{background:radial-gradient(ellipse at 35% 30%,#d4c49a,#a89270);color:#1a1a2e;border:2px solid #988060;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.1),inset 0 2px 3px rgba(255,255,255,0.25);}
.cell.h0{background:radial-gradient(ellipse at 50% 50%,#1e1e30,#12121a);color:transparent;border:2px solid #2a2a4a;box-shadow:inset 0 2px 8px rgba(0,0,0,0.5);}
.cell .power-tag{position:absolute;font-size:8px;font-weight:700;line-height:1;z-index:5;text-shadow:0 0 3px rgba(0,0,0,0.9),0 0 6px rgba(0,0,0,0.7);}
.cell.water-hit{animation:waterHit 0.25s ease;}
@keyframes waterHit{0%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:inset 0 0 15px 5px rgba(245,158,11,0.5);}100%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0);}}
.cell.washed{animation:washAway 0.35s ease;}
.cell.trail{animation:trailFade 1.2s ease forwards;}
@keyframes trailFade{0%{box-shadow:inset 0 0 12px 4px var(--trail-color,#f59e0b);}100%{box-shadow:inset 0 0 0 0 transparent;}}
@keyframes washAway{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:0.6;background:#f59e0b;}100%{transform:scale(1);opacity:1;}}
.payout-area{min-height:80px;margin-top:8px;text-align:center;font-size:13px;color:#d4d4d8;}
.info-bar{display:flex;justify-content:space-between;margin-top:10px;font-size:10px;color:#f59e0b;border-top:1px solid #1e1e2e;padding-top:6px;}
.channel-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,0.12) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:100;}
.channel-flash.show{opacity:1;}
.rotate-indicator{text-align:center;font-size:11px;color:#f59e0b;padding:4px 0;opacity:0;transition:opacity 0.3s;}
.rotate-indicator.show{opacity:1;}
.tut-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;display:none;pointer-events:auto;}
.tut-overlay.show{display:block;}
.tut-hole{position:absolute;border:3px solid #f59e0b;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.75);z-index:151;pointer-events:none;animation:tut-pulse 1.5s ease-in-out infinite;}
@keyframes tut-pulse{0%,100%{box-shadow:0 0 0 9999px rgba(0,0,0,0.75),0 0 12px #f59e0b;}50%{box-shadow:0 0 0 9999px rgba(0,0,0,0.75),0 0 24px #f59e0b;}}
.tut-text{position:fixed;left:50%;transform:translateX(-50%);z-index:152;background:#1a1a2e;border:2px solid #f59e0b;border-radius:10px;padding:12px 20px;color:#e4e4e7;font-size:14px;text-align:center;max-width:380px;line-height:1.5;font-family:'JetBrains Mono',monospace;}
.tut-text .tut-step{color:#f59e0b;font-size:10px;letter-spacing:2px;margin-bottom:4px;}
.tut-skip{position:fixed;top:10px;right:10px;z-index:153;background:none;border:1px solid #666;color:#999;font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
.tut-skip:hover{color:#fff;border-color:#f59e0b;}
</style></head><body>
<div id="app">
    <h1>NOISORE</h1><div class="version">v10.2</div>
    <button id="mute-btn" onclick="sndToggle()" style="position:fixed;top:8px;right:8px;z-index:200;background:none;border:1px solid #333;border-radius:6px;color:#888;font-size:18px;padding:4px 8px;cursor:pointer;">&#128263;</button>
    <div id="lobby">
        <div class="lobby-section">
            <div class="lobby-label">Mode</div>
            <div class="lobby-row">
                <button class="lbtn active" onclick="setMode('solo')" id="mode-solo">EROSION</button>
                <button class="lbtn" onclick="setMode('pvp')" id="mode-pvp">SOIRON</button>
                <button class="lbtn" onclick="setMode('bet')" id="mode-bet">Bet&Wet</button>
            </div>
        </div>
        <div class="lobby-section">
            <div class="lobby-label">Grid</div>
            <div class="lobby-row">
                <button class="lbtn active" onclick="setGrid(6)" id="grid-6">6×6</button>
                <button class="lbtn" onclick="setGrid(8)" id="grid-8">8×8</button>
            </div>
        </div>
        <div class="lobby-section">
            <div class="lobby-label">Rotation</div>
            <div class="lobby-row">
                <button class="lbtn" onclick="setRotation(false)" id="rot-off">OFF</button>
                <button class="lbtn active" onclick="setRotation(true)" id="rot-on">ON</button>
            </div>
        </div>
        <div class="lobby-section" id="stake-section" style="display:none">
            <div class="lobby-label" id="stake-label">Stake per drop</div>
            <div class="lobby-row">
                <button class="lbtn active" onclick="setStake(0)" id="stake-0">FREE</button>
                <button class="lbtn" onclick="setStake(0.1)" id="stake-01">0.10</button>
                <button class="lbtn" onclick="setStake(0.5)" id="stake-05">0.50</button>
                <button class="lbtn" onclick="setStake(1)" id="stake-1">1.00</button>
                <button class="lbtn" onclick="setStake(5)" id="stake-5">5.00</button>
            </div>
        </div>
        <div class="lobby-section" id="bots-section" style="display:none">
            <div class="lobby-label">Opponents</div>
            <div class="lobby-row">
                <button class="lbtn" onclick="setBots(1)" id="bots-1">1</button>
                <button class="lbtn active" onclick="setBots(2)" id="bots-2">2</button>
                <button class="lbtn" onclick="setBots(4)" id="bots-4">4</button>
                <button class="lbtn" onclick="setBots(7)" id="bots-7">7</button>
                <button class="lbtn" onclick="setBots(11)" id="bots-11">11</button>
            </div>
        </div>
        <div class="lobby-section" id="fighter-section" style="display:none">
            <div class="lobby-label">Pick your fighter</div>
            <div class="lobby-row" id="fighter-btns" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
            </div>
            <div class="lobby-hint" id="fighter-odds"></div>
        </div>
        <button class="play-btn" onclick="startGame()">▶ PLAY</button>
        <div style="text-align:center;margin-top:8px"><button onclick="startTutorial()" style="background:none;border:1px solid #555;color:#999;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 16px;border-radius:6px;cursor:pointer;letter-spacing:1px">? HOW TO PLAY</button></div>
        <div class="lobby-hint">Water beats stone. Skill beats luck.</div>
    </div>
    <div id="game">
        <div class="game-header">
            <span class="game-title" id="game-mode-label">EROSION</span>
            <button class="back-btn" onclick="backToLobby()">✕ LOBBY</button>
        </div>
        <div class="stats"><div>BALANCE <span class="val" id="balance">100.00</span></div><div>DROPS <span class="val" id="drop-num">0</span></div><div>ROUND <span class="val" id="round-num">1</span></div></div>
        <div class="pool-area" id="pool-area-wrap" style="display:none"><div class="pool-left"><div class="pool-label">Prize Pool</div><div class="pool-value" id="pool-value">0.00</div><div class="pool-unit">USDT</div></div><div class="players-list" id="players-list"></div></div>
        <div class="drop-info"><div class="drop-who" id="drop-who">YOUR<br>DROP</div><div class="drop-power-value" id="drop-power">&mdash;</div><div class="drop-remaining" id="drop-remaining"></div></div>
        <div class="col-selectors" id="col-btns"></div>
        <div class="grid-wrap"><div class="grid" id="grid"></div></div>
        <div class="rotate-indicator" id="rotate-ind">↻ rotated 90°</div>
        <div class="payout-area" id="payout-area"></div>
        <div class="info-bar"><div id="info-left">6×6</div><div id="info-right">free play</div></div>
    </div>
</div>
<div class="channel-flash" id="channel-flash"></div>
<div class="tut-overlay" id="tut-overlay"></div>
<div class="tut-hole" id="tut-hole" style="display:none"></div>
<div class="tut-text" id="tut-text" style="display:none"></div>
<button class="tut-skip" id="tut-skip" style="display:none" onclick="tutSkip()">SKIP ✕</button>

<script src="engine.js?v=102"></script>
<script src="game.js?v=102"></script>
<script src="tutorial.js?v=102"></script>
