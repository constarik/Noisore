<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NOISORE v0.1</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TRP1QX4878"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TRP1QX4878');</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#e4e4e7;font-family:'JetBrains Mono',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#game-container{width:400px;padding:16px;position:relative;}
h1{font-family:'Archivo Black',sans-serif;font-size:28px;color:#f59e0b;text-align:center;letter-spacing:6px;margin-bottom:2px;}
.version{text-align:center;font-size:10px;color:#555;margin-bottom:10px;}
.stats{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:#71717a;}
.stats .val{color:#e4e4e7;font-weight:700;}
.pool-area{text-align:center;margin-bottom:10px;padding:12px;background:#12121a;border:1px solid #1e1e2e;border-radius:10px;}
.pool-label{font-size:11px;color:#71717a;letter-spacing:2px;text-transform:uppercase;}
.pool-value{font-family:'Archivo Black',sans-serif;font-size:38px;color:#f59e0b;line-height:1.2;}
.pool-unit{font-size:14px;color:#71717a;}
.drop-power-area{text-align:center;margin-bottom:8px;min-height:44px;display:flex;align-items:center;justify-content:center;gap:8px;}
.drop-power-label{font-size:11px;color:#71717a;}
.drop-power-value{font-family:'Archivo Black',sans-serif;font-size:32px;line-height:1;min-width:44px;text-align:center;}
.dp1{color:#555;}.dp2{color:#6a8;}.dp3{color:#4ad;}.dp4{color:#c82;}.dp5{color:#d44;}
.dp6{color:#d26;}.dp7{color:#a3d;}.dp8{color:#63e;}.dp9{color:#24f;}.dp10{color:#e22;font-size:36px;text-shadow:0 0 12px rgba(224,16,16,0.4);}
.col-selectors{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:4px;padding:0 2px;}
.col-btn{background:#1a1a2e;border:2px solid #2a2a4a;border-radius:6px 6px 0 0;color:#f59e0b;font-size:18px;font-weight:700;padding:8px 0;cursor:pointer;transition:all 0.15s;text-align:center;}
.col-btn:hover{background:#2a2a4a;border-color:#f59e0b;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,0.2);}
.col-btn:active{transform:translateY(0);}.col-btn.disabled{opacity:0.3;pointer-events:none;}
.grid-wrap{padding:3px;background:#12121a;border-radius:6px;border:1px solid #1e1e2e;}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;}
.cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;transition:all 0.15s;position:relative;overflow:hidden;}
.cell.h10{background:#6b4226;color:#fff;border:2px solid #7d4e2e;}.cell.h9{background:#6e4a2a;color:#fff;border:2px solid #80522e;}
.cell.h8{background:#72522e;color:#fff;border:2px solid #845a32;}.cell.h7{background:#765a34;color:#fff;border:2px solid #886238;}
.cell.h6{background:#7a623a;color:#fff;border:2px solid #8c6a3e;}.cell.h5{background:#7e6a40;color:#fff;border:2px solid #907246;}
.cell.h4{background:#88784e;color:#fff;border:2px solid #9a8456;}.cell.h3{background:#92865c;color:#fff;border:2px solid #a49264;}
.cell.h2{background:#a89878;color:#1a1a2e;border:2px solid #b8a888;}.cell.h1{background:#c0b090;color:#1a1a2e;border:2px solid #d0c0a0;}
.cell.h0{background:#1a1a2e;color:transparent;border:2px solid #2a2a4a;}
.cell .orig-badge{position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 18px 18px 0;border-color:transparent rgba(255,255,255,0.12) transparent transparent;}
.cell .orig-num{position:absolute;top:1px;right:2px;font-size:8px;font-weight:700;color:rgba(255,255,255,0.7);line-height:1;z-index:1;}
.cell.h0 .orig-badge{border-color:transparent rgba(245,158,11,0.15) transparent transparent;}
.cell.h0 .orig-num{color:rgba(245,158,11,0.4);}
.cell.drop-stopped::after{content:'\2715';position:absolute;font-size:10px;bottom:1px;left:2px;color:rgba(255,80,80,0.6);}
.cell.water-hit{animation:waterHit 0.25s ease;}
@keyframes waterHit{0%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:inset 0 0 15px 5px rgba(245,158,11,0.5);}100%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0);}}
.cell.washed{animation:washAway 0.35s ease;}
@keyframes washAway{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:0.6;background:#f59e0b;}100%{transform:scale(1);opacity:1;}}
.cell.refill{animation:refillDrop 0.3s ease;}
@keyframes refillDrop{0%{transform:translateY(-20px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.cell.channel-glow{background:#f59e0b !important;border:3px solid #fbbf24 !important;box-shadow:0 0 16px rgba(245,158,11,0.8) !important;animation:chPulse 0.4s ease infinite alternate !important;overflow:visible !important;z-index:10;}
.cell.channel-glow .main-num{display:none;}
@keyframes chPulse{0%{box-shadow:0 0 12px rgba(245,158,11,0.6);}100%{box-shadow:0 0 24px rgba(245,158,11,1.0);}}
.win-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,0.92);z-index:50;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;}
.win-overlay.show{display:flex;}
.win-title{font-family:'Archivo Black',sans-serif;font-size:20px;color:#f59e0b;letter-spacing:3px;margin-bottom:8px;}
.win-amount{font-family:'Archivo Black',sans-serif;font-size:52px;color:#fff;}
.win-sub{font-size:12px;color:#71717a;margin-top:4px;}
.win-btn{margin-top:20px;background:#f59e0b;color:#0a0a0f;font-family:'Archivo Black',sans-serif;font-size:14px;padding:10px 32px;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px;transition:all 0.15s;}
.win-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(245,158,11,0.4);}
.payout-area{min-height:36px;margin-top:8px;text-align:center;font-size:13px;color:#71717a;}
.info-bar{display:flex;justify-content:space-between;margin-top:10px;font-size:10px;color:#555;border-top:1px solid #1e1e2e;padding-top:6px;}
.channel-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,0.12) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:100;}
.channel-flash.show{opacity:1;}
</style>
</head>
<body>
<div id="game-container">
    <h1>NOISORE</h1>
    <div class="version">v0.1</div>
    <div class="stats">
        <div>BALANCE <span class="val" id="balance">100</span></div>
        <div>DROPS <span class="val" id="drop-num">0</span></div>
        <div>ROUND <span class="val" id="round-num">1</span></div>
    </div>
    <div class="pool-area">
        <div class="pool-label">Prize Pool</div>
        <div class="pool-value" id="pool-value">0</div>
        <div class="pool-unit">USDT</div>
    </div>
    <div class="drop-power-area">
        <div class="drop-power-label">DROP<br>POWER</div>
        <div class="drop-power-value" id="drop-power">&mdash;</div>
    </div>
    <div class="col-selectors" id="col-btns"></div>
    <div class="grid-wrap" style="position:relative;">
        <div class="grid" id="grid"></div>
        <div class="win-overlay" id="win-overlay">
            <div class="win-title">CHANNEL CARVED</div><div class="win-title" id="win-title2" style="font-size:16px;margin-bottom:4px;">YOU WIN</div>
            <div class="win-amount" id="win-amount">0</div>
            <div class="win-sub">USDT WON</div>
            <div class="win-btn" onclick="newRound()">NEXT ROUND</div>
        </div>
    </div>
    <div class="payout-area" id="payout-area"></div>
    <div class="info-bar">
        <div>6x5 - stone 1-10 - drop 1-10</div>
        <div>1 drop = 1 USDT - 95% to pool</div>
    </div>
</div>
<div class="channel-flash" id="channel-flash"></div>
<script>
const COLS=6,ROWS=5,MAX_H=10,MAX_DROP=10,DROP_COST=1,POOL_RATE=0.95,ANIM_DELAY=180;
const BOTS=[{name:'Axel',color:'#4ad'},{name:'Kira',color:'#d4a'}];
let grid=[],origGrid=[],pool=0,balance=100,spent=0,dropNum=0,roundNum=1,animating=false,currentDrop=0;
function randH(){return 1+Math.floor(Math.random()*MAX_H);}
function randDrop(){return 1+Math.floor(Math.random()*MAX_DROP);}
function initGrid(){grid=[];origGrid=[];for(let r=0;r<ROWS;r++){grid[r]=[];origGrid[r]=[];for(let c=0;c<COLS;c++){const h=randH();grid[r][c]=h;origGrid[r][c]=h;}}}
function newRound(){document.getElementById('win-overlay').classList.remove('show');initGrid();pool=0;dropNum=0;roundNum++;updateUI();renderGrid();rollDrop();setColBtnsDisabled(false);}
function initGame(){initGrid();pool=0;balance=100;spent=0;dropNum=0;roundNum=1;animating=false;updateUI();renderGrid();renderColBtns();rollDrop();}
function renderGrid(){const el=document.getElementById('grid');el.innerHTML='';for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)el.appendChild(makeCell(r,c));}
function makeCell(r,c){const cell=document.createElement('div');cell.className=`cell h${grid[r][c]}`;cell.id=`cell-${r}-${c}`;const mn=document.createElement('span');mn.className='main-num';mn.textContent=grid[r][c]>0?grid[r][c]:'';cell.appendChild(mn);const badge=document.createElement('div');badge.className='orig-badge';cell.appendChild(badge);const on=document.createElement('div');on.className='orig-num';on.textContent=origGrid[r][c];cell.appendChild(on);return cell;}
function updateCell(r,c){const cell=document.getElementById(`cell-${r}-${c}`);const hadGlow=cell.classList.contains('channel-glow');cell.className=`cell h${grid[r][c]}`;if(hadGlow)cell.classList.add('channel-glow');cell.innerHTML='';const mn=document.createElement('span');mn.className='main-num';mn.textContent=grid[r][c]>0?grid[r][c]:'';cell.appendChild(mn);const badge=document.createElement('div');badge.className='orig-badge';cell.appendChild(badge);const on=document.createElement('div');on.className='orig-num';on.textContent=origGrid[r][c];cell.appendChild(on);}
function renderColBtns(){const el=document.getElementById('col-btns');el.innerHTML='';for(let c=0;c<COLS;c++){const btn=document.createElement('div');btn.className='col-btn';btn.textContent='\uD83D\uDCA7';btn.onclick=()=>playDrop(c);el.appendChild(btn);}}
function updateUI(){document.getElementById('pool-value').textContent=pool.toFixed(2);document.getElementById('balance').textContent=balance.toFixed(2);document.getElementById('drop-num').textContent=dropNum;document.getElementById('round-num').textContent=roundNum;}
function rollDrop(){currentDrop=randDrop();const el=document.getElementById('drop-power');el.textContent=currentDrop;el.className='drop-power-value dp'+currentDrop;document.getElementById('payout-area').innerHTML='<span style="color:#555">choose a column \u2191</span>';}
function setColBtnsDisabled(d){document.querySelectorAll('.col-btn').forEach(b=>{if(d)b.classList.add('disabled');else b.classList.remove('disabled');});}
function chooseNext(row,col){const cands=[];for(let dc=-1;dc<=1;dc++){const nc=col+dc;if(nc>=0&&nc<COLS)cands.push({c:nc,h:grid[row+1][nc]});}const nz=cands.filter(x=>x.h>0);if(nz.length===0)return cands[Math.floor(Math.random()*cands.length)].c;const w=nz.map(x=>1/x.h);const tw=w.reduce((a,b)=>a+b,0);let r=Math.random()*tw;for(let i=0;i<nz.length;i++){r-=w[i];if(r<=0)return nz[i].c;}return nz[nz.length-1].c;}
function botPickCol(){return Math.floor(Math.random()*COLS);}
async function botDrop(bot){const dp=randDrop();const col=botPickCol();pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();document.getElementById('payout-area').innerHTML=`<span style="color:${bot.color}">${bot.name} drops power ${dp}</span>`;let power=dp,c=col;for(let row=0;row<ROWS&&power>0;row++){const cell=document.getElementById(`cell-${row}-${c}`);cell.classList.remove('water-hit');void cell.offsetWidth;cell.classList.add('water-hit');if(grid[row][c]===0){await sleep(ANIM_DELAY/2);if(row<ROWS-1)c=chooseNext(row,c);continue;}if(power>=grid[row][c]){power-=grid[row][c];grid[row][c]=0;updateCell(row,c);cell.classList.add('washed');}else{grid[row][c]-=power;power=0;updateCell(row,c);}await sleep(ANIM_DELAY);if(power>0&&row<ROWS-1)c=chooseNext(row,c);}const ch=findChannelCells();if(ch.size>0){for(const key of ch){const[r2,c2]=key.split('-').map(Number);document.getElementById(`cell-${r2}-${c2}`).classList.add('channel-glow');}const flash=document.getElementById('channel-flash');flash.classList.add('show');await sleep(1500);flash.classList.remove('show');document.getElementById('win-amount').textContent=pool.toFixed(2);document.getElementById('win-title2').textContent=bot.name+' WINS';document.getElementById('win-title2').style.color=bot.color;document.getElementById('win-overlay').classList.add('show');updateUI();animating=false;setColBtnsDisabled(true);return true;}return false;}
async function playDrop(startCol){if(animating)return;animating=true;setColBtnsDisabled(true);if(balance<DROP_COST){document.getElementById('payout-area').innerHTML='<span style="color:#f55">insufficient balance</span>';animating=false;setColBtnsDisabled(false);return;}balance-=DROP_COST;spent+=DROP_COST;pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();let power=currentDrop,col=startCol,washed=0;for(let row=0;row<ROWS&&power>0;row++){const cell=document.getElementById(`cell-${row}-${col}`);cell.classList.remove('water-hit');void cell.offsetWidth;cell.classList.add('water-hit');if(grid[row][col]===0){await sleep(ANIM_DELAY/2);if(row<ROWS-1)col=chooseNext(row,col);continue;}if(power>=grid[row][col]){power-=grid[row][col];grid[row][col]=0;washed++;updateCell(row,col);cell.classList.add('washed');}else{grid[row][col]-=power;power=0;updateCell(row,col);cell.classList.add('drop-stopped');}await sleep(ANIM_DELAY);if(power>0&&row<ROWS-1)col=chooseNext(row,col);}if(washed>0)document.getElementById('payout-area').innerHTML=`<span style="color:#f59e0b">${washed} stone${washed>1?'s':''} eroded</span>`;else document.getElementById('payout-area').innerHTML='<span style="color:#555">no erosion</span>';const ch=findChannelCells();if(ch.size>0){for(const key of ch){const[r,c]=key.split('-').map(Number);document.getElementById(`cell-${r}-${c}`).classList.add('channel-glow');}const flash=document.getElementById('channel-flash');flash.classList.add('show');await sleep(1500);flash.classList.remove('show');balance+=pool;document.getElementById('win-amount').textContent=pool.toFixed(2);document.getElementById('win-title2').textContent='YOU WIN';document.getElementById('win-title2').style.color='#f59e0b';document.getElementById('win-overlay').classList.add('show');updateUI();document.querySelectorAll('.drop-stopped').forEach(el=>el.classList.remove('drop-stopped'));animating=false;setColBtnsDisabled(true);return;}document.querySelectorAll('.drop-stopped').forEach(el=>el.classList.remove('drop-stopped'));await sleep(300);for(const bot of BOTS){if(await botDrop(bot))return;await sleep(300);}rollDrop();animating=false;setColBtnsDisabled(false);}
function findChannelCells(){const ch=new Set();for(let c=0;c<COLS;c++){if(grid[0][c]===0){const path=[];if(dfsCollect(0,c,new Set(),path))for(const key of path)ch.add(key);}}return ch;}
function dfsCollect(row,col,visited,path){const key=`${row}-${col}`;if(visited.has(key))return false;visited.add(key);if(grid[row][col]!==0)return false;path.push(key);if(row===ROWS-1)return true;let found=false;for(let dc=-1;dc<=1;dc++){const nc=col+dc;if(nc>=0&&nc<COLS){const before=path.length;if(dfsCollect(row+1,nc,visited,path))found=true;else path.length=before;}}if(!found)path.pop();return found;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
initGame();
</script>
</body>
</html>
