@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:#0a0a14;color:#e4e4e7;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;}
#app{width:100%;max-width:400px;padding:8px 10px;display:flex;flex-direction:column;height:100vh;overflow-y:auto;z-index:1;position:relative;background:rgba(10,10,20,0.75);}
h1{font-family:'Archivo Black',sans-serif;font-size:22px;color:#f59e0b;text-align:center;letter-spacing:5px;margin-bottom:1px;text-shadow:0 2px 8px rgba(0,0,0,0.5);}
.version{text-align:center;font-size:9px;color:#f59e0b;margin-bottom:8px;}
#lobby{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;}
.lobby-section{margin-bottom:10px;}
.lobby-label{font-size:10px;color:#d4d4d8;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.lobby-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
.lbtn{background:#12121a;border:2px solid #2a2a4a;border-radius:8px;color:#d4d4d8;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:8px 10px;cursor:pointer;min-width:48px;transition:all 0.1s;}
.lbtn.active{background:#f59e0b;color:#0a0a0f;border-color:#f59e0b;}
.lbtn.disabled{opacity:0.3;pointer-events:none;}
.play-btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0a0f;font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:4px;padding:12px 40px;border:none;border-radius:10px;cursor:pointer;margin-top:12px;}
.lobby-hint{font-size:10px;color:#b0b0b8;margin-top:6px;}
#game{display:none;}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.game-title{font-family:'Archivo Black',sans-serif;font-size:13px;color:#f59e0b;letter-spacing:2px;}
.back-btn{background:none;border:1px solid #2a2a4a;color:#d4d4d8;font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer;}
.back-btn:hover{border-color:#f59e0b;color:#f59e0b;}
.stats{display:flex;justify-content:space-between;font-size:10px;color:#d4d4d8;margin-bottom:4px;}
.stats .val{color:#e4e4e7;font-weight:700;}
.pool-area{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#12121a;border:1px solid #1e1e2e;border-radius:8px;margin-bottom:4px;gap:8px;}
.pool-area.vertical{flex-direction:column;align-items:stretch;}
.pool-left{flex:1;}.pool-label{font-size:9px;color:#d4d4d8;letter-spacing:1px;text-transform:uppercase;}
.pool-value{font-family:'Archivo Black',sans-serif;font-size:22px;color:#f59e0b;line-height:1.2;}.pool-unit{font-size:9px;color:#d4d4d8;}
.players-list{display:flex;flex-direction:column;gap:2px;min-width:100px;}
.players-list.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:1px 8px;min-width:200px;}
.player-row{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;transition:all 0.2s;}
.player-row .p-order{font-size:9px;color:#f59e0b;min-width:12px;}.player-row .p-name{min-width:36px;}
.player-row .p-drop{font-family:'Archivo Black',sans-serif;font-size:12px;min-width:18px;text-align:center;opacity:0;transition:opacity 0.2s;}
.player-row .p-drop.show{opacity:1;}.player-row .p-remaining{font-size:9px;color:#f59e0b;min-width:20px;}
.player-row.active{transform:scale(1.05);}.player-row.done{opacity:0.7;}
.drop-info{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;min-height:36px;}
.drop-who{font-size:10px;color:#d4d4d8;min-width:40px;text-align:right;}
.drop-power-value{font-family:'Archivo Black',sans-serif;font-size:28px;line-height:1;min-width:36px;text-align:center;}
.drop-remaining{font-size:12px;color:#d4d4d8;min-width:60px;text-align:left;}.drop-remaining .rem{color:#f59e0b;font-weight:700;}
.dp1{color:#f59e0b;}.dp2{color:#6a8;}.dp3{color:#4ad;}.dp4{color:#c82;}.dp5{color:#d44;}

.col-btn:active{background:#2a2a4a;border-color:#f59e0b;}
.col-btn.disabled{opacity:0.3;pointer-events:none;}
.grid-wrap{padding:2px;border-radius:5px;border:1px solid #2a2a3a;background:rgba(10,10,20,0.85);box-shadow:inset 0 0 20px rgba(0,0,0,0.6),0 3px 15px rgba(0,0,0,0.5);}
.grid{display:grid;gap:2px;}
.cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;position:relative;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
.cell.h10{background:radial-gradient(ellipse at 35% 30%,#8b5a30,#5a3218);color:#fff;border:1px solid #4a2a12;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.4),inset 0 1px 3px rgba(255,255,255,0.1);}
.cell.h9{background:radial-gradient(ellipse at 35% 30%,#8f5e34,#5e361c);color:#fff;border:1px solid #4e2e16;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.4),inset 0 1px 3px rgba(255,255,255,0.1);}
.cell.h8{background:radial-gradient(ellipse at 35% 30%,#936238,#624020);color:#fff;border:1px solid #523018;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.35),inset 0 1px 3px rgba(255,255,255,0.1);}
.cell.h7{background:radial-gradient(ellipse at 35% 30%,#97683e,#664624);color:#fff;border:1px solid #56361c;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.35),inset 0 1px 3px rgba(255,255,255,0.1);}
.cell.h6{background:radial-gradient(ellipse at 35% 30%,#9b7044,#6a4c28);color:#fff;border:1px solid #5a3c20;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.3),inset 0 1px 2px rgba(255,255,255,0.12);}
.cell.h5{background:radial-gradient(ellipse at 35% 30%,#a07848,#6e522c);color:#fff;border:1px solid #5e4224;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.3),inset 0 1px 2px rgba(255,255,255,0.12);}
.cell.h4{background:radial-gradient(ellipse at 35% 30%,#a88856,#786238);color:#fff;border:1px solid #685230;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.25),inset 0 1px 2px rgba(255,255,255,0.15);}
.cell.h3{background:radial-gradient(ellipse at 35% 30%,#b09868,#887248);color:#fff;border:1px solid #786240;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.2),inset 0 1px 2px rgba(255,255,255,0.15);}
.cell.h2{background:radial-gradient(ellipse at 35% 30%,#c0aa82,#988260);color:#1a1a2e;border:1px solid #887250;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.15),inset 0 1px 2px rgba(255,255,255,0.2);}
.cell.h1{background:radial-gradient(ellipse at 35% 30%,#d4c49a,#a89270);color:#1a1a2e;border:1px solid #988060;box-shadow:inset 0 -2px 2px rgba(0,0,0,0.1),inset 0 1px 2px rgba(255,255,255,0.25);}
.cell.h0{background:radial-gradient(ellipse at 50% 50%,#1e1e30,#12121a);color:transparent;border:1px solid #2a2a4a;box-shadow:inset 0 2px 6px rgba(0,0,0,0.5);}
.cell .power-tag{position:absolute;font-size:7px;font-weight:700;line-height:1;z-index:5;text-shadow:0 0 2px rgba(0,0,0,0.9),0 0 4px rgba(0,0,0,0.7);}
.cell.water-hit{animation:waterHit 0.2s ease;}
@keyframes waterHit{0%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:inset 0 0 10px 3px rgba(245,158,11,0.5);}100%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0);}}
.cell.washed{animation:washAway 0.3s ease;}
.cell.trail{animation:trailFade 1.2s ease forwards;}
@keyframes trailFade{0%{box-shadow:inset 0 0 10px 3px var(--trail-color,#f59e0b);}100%{box-shadow:inset 0 0 0 0 transparent;}}
@keyframes washAway{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.1);opacity:0.6;background:#f59e0b;}100%{transform:scale(1);opacity:1;}}
.payout-area{min-height:70px;margin-top:4px;text-align:center;font-size:11px;color:#d4d4d8;}
.info-bar{display:flex;justify-content:space-between;font-size:9px;color:#f59e0b;border-top:1px solid #1e1e2e;padding-top:4px;margin-top:4px;}
.channel-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,0.12) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:100;}
.channel-flash.show{opacity:1;}
.rotate-indicator{text-align:center;font-size:10px;color:#f59e0b;padding:2px 0;opacity:0;transition:opacity 0.3s;}
.rotate-indicator.show{opacity:1;}
