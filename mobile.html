<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

.pool-unit{font-size:9px;color:#d4d4d8;}
.players-compact{display:flex;gap:6px;flex-wrap:wrap;font-size:10px;font-weight:700;}
.pc-item{display:flex;align-items:center;gap:3px;}

.pc-drop.show{opacity:1;}
.pc-item.active{transform:scale(1.1);}.pc-item.done{opacity:0.4;}
.drop-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;min-height:36px;}
.drop-who{font-size:10px;color:#d4d4d8;}
.drop-power-value{font-family:'Archivo Black',sans-serif;font-size:28px;line-height:1;}
.drop-remaining{font-size:12px;color:#d4d4d8;}.drop-remaining .rem{color:#f59e0b;font-weight:700;}
.dp1{color:#f59e0b;}.dp2{color:#6a8;}.dp3{color:#4ad;}.dp4{color:#c82;}.dp5{color:#d44;}
.dp6{color:#d26;}.dp7{color:#a3d;}.dp8{color:#63e;}.dp9{color:#24f;}.dp10{color:#e22;font-size:32px;text-shadow:0 0 10px rgba(224,16,16,0.4);}
.col-selectors{display:grid;gap:3px;margin-bottom:3px;}
.col-btn{background:#1a1a2e;border:2px solid #2a2a4a;border-radius:5px 5px 0 0;color:#f59e0b;font-size:16px;font-weight:700;padding:6px 0;cursor:pointer;text-align:center;min-height:36px;}
.col-btn:active{background:#2a2a4a;border-color:#f59e0b;}
.col-btn.disabled{opacity:0.3;pointer-events:none;}
.grid-wrap{padding:2px;background:#12121a;border-radius:5px;border:1px solid #1e1e2e;flex:1;display:flex;}
.grid{display:grid;gap:2px;width:100%;align-content:start;}
.cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;position:relative;overflow:hidden;}
.cell.h10{background:#6b4226;color:#fff;border:1px solid #7d4e2e;}.cell.h9{background:#6e4a2a;color:#fff;border:1px solid #80522e;}
.cell.h8{background:#72522e;color:#fff;border:1px solid #845a32;}.cell.h7{background:#765a34;color:#fff;border:1px solid #886238;}
.cell.h6{background:#7a623a;color:#fff;border:1px solid #8c6a3e;}.cell.h5{background:#7e6a40;color:#fff;border:1px solid #907246;}
.cell.h4{background:#88784e;color:#fff;border:1px solid #9a8456;}.cell.h3{background:#92865c;color:#fff;border:1px solid #a49264;}
.cell.h2{background:#a89878;color:#1a1a2e;border:1px solid #b8a888;}.cell.h1{background:#c0b090;color:#1a1a2e;border:1px solid #d0c0a0;}
.cell.h0{background:#1a1a2e;color:transparent;border:1px solid #2a2a4a;}
.cell .power-tag{position:absolute;font-size:7px;font-weight:700;line-height:1;z-index:5;text-shadow:0 0 2px rgba(0,0,0,0.9),0 0 4px rgba(0,0,0,0.7);}
.cell.water-hit{animation:waterHit 0.2s ease;}
@keyframes waterHit{0%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:inset 0 0 10px 3px rgba(245,158,11,0.5);}100%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0);}}
.cell.washed{animation:washAway 0.3s ease;}
@keyframes washAway{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.1);opacity:0.6;background:#f59e0b;}100%{transform:scale(1);opacity:1;}}
.payout-area{min-height:24px;margin-top:4px;text-align:center;font-size:11px;color:#d4d4d8;}
.info-bar{display:flex;justify-content:space-between;font-size:9px;color:#f59e0b;border-top:1px solid #1e1e2e;padding-top:4px;margin-top:4px;}
.rotate-indicator{text-align:center;font-size:10px;color:#f59e0b;padding:2px 0;opacity:0;transition:opacity 0.3s;}
.rotate-indicator.show{opacity:1;}
.channel-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,0.12) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:100;}
.channel-flash.show{opacity:1;}
</style></head><body>

<script src="engine.js"></script>
<script>
requireEngine(1);
var CFG={mode:'solo',gridSize:6,rotate:true,stake:0,numBots:2};
var BOT_POOL=[
    {name:'Axel',color:'#4ad',smart:false},{name:'Kira',color:'#d4a',smart:true},
    {name:'Rex',color:'#4d8',smart:false},{name:'Nova',color:'#a6f',smart:true},
    {name:'Zed',color:'#f66',smart:false},{name:'Ivy',color:'#6d6',smart:true},
    {name:'Bolt',color:'#fa0',smart:false},{name:'Luna',color:'#8af',smart:true},
    {name:'Jinx',color:'#f4a',smart:false},{name:'Sage',color:'#ad4',smart:true},
    {name:'Dex',color:'#6af',smart:false}
];
function setMode(m){
    CFG.mode=m;
    document.querySelectorAll('#lobby .lobby-section:first-child .lbtn').forEach(function(b){b.classList.remove('active');});
    document.getElementById('mode-'+m).classList.add('active');
    document.getElementById('bots-section').style.display=m==='pvp'?'':'none';
    document.getElementById('stake-section').style.display=m==='solo'?'none':'';
}
function setGrid(s){CFG.gridSize=s;document.getElementById('grid-6').classList.toggle('active',s===6);document.getElementById('grid-8').classList.toggle('active',s===8);}
function setRotation(on){CFG.rotate=on;document.getElementById('rot-off').classList.toggle('active',!on);document.getElementById('rot-on').classList.toggle('active',on);}
function setStake(v){CFG.stake=v;document.querySelectorAll('#stake-section .lbtn').forEach(function(b){b.classList.remove('active');});var id='stake-'+String(v).replace('.','');var el=document.getElementById(id);if(el)el.classList.add('active');}
function setBots(n){CFG.numBots=n;document.querySelectorAll('#bots-section .lbtn').forEach(function(b){b.classList.remove('active');});document.getElementById('bots-'+n).classList.add('active');}
function startGame(){
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='flex';
    COLS=CFG.gridSize;ROWS=CFG.gridSize;MAX_H=10;MAX_DROP=10;ROTATE=CFG.rotate;
    DROP_COST=(CFG.mode==='pvp'&&CFG.stake===0)?1:CFG.stake;POOL_RATE=0.95;
    if(CFG.mode==='solo'){BOTS=[];document.getElementById('pool-bar').style.display='none';document.getElementById('game-mode-label').textContent='EROSION';}
    else{BOTS=BOT_POOL.slice(0,CFG.numBots);document.getElementById('pool-bar').style.display='flex';document.getElementById('game-mode-label').textContent='NOISORE';}
    document.getElementById('info-left').textContent=COLS+'×'+ROWS+(ROTATE?' ↻':'');
    document.getElementById('info-right').textContent=DROP_COST>0?(DROP_COST.toFixed(2)+'/drop'):'free';
    document.getElementById('grid').style.gridTemplateColumns='repeat('+COLS+',1fr)';
    document.getElementById('col-btns').style.gridTemplateColumns='repeat('+COLS+',1fr)';
    initGame();
}
function backToLobby(){document.getElementById('game').style.display='none';document.getElementById('lobby').style.display='flex';animating=false;}
// === GAME STATE ===
var COLS=6,ROWS=6,MAX_H=10,MAX_DROP=10,DROP_COST=0,POOL_RATE=0.95,ANIM_DELAY=180;
var ROTATE=true,BOTS=[];
var grid=[],pool=0,balance=100,dropNum=0,roundNum=1,animating=false,currentDrop=0,turnPlayers=[];
var TAG_POS=[{top:'0',left:'1px'},{top:'0',right:'1px'},{bottom:'0',left:'1px'},{bottom:'0',right:'1px'},{top:'0',left:'50%',tx:'-50%'},{bottom:'0',left:'50%',tx:'-50%'},{top:'50%',left:'0',ty:'-50%'},{top:'50%',right:'0',ty:'-50%'},{top:'30%',left:'1px'},{top:'30%',right:'1px'},{bottom:'30%',left:'1px'},{bottom:'30%',right:'1px'}];
function randH(){return 1+Math.floor(Math.random()*MAX_H);}
function initGrid(){grid=[];for(var r=0;r<ROWS;r++){grid[r]=[];for(var c=0;c<COLS;c++)grid[r][c]=randH();}}
function newRound(){clearPowerTags();initGrid();pool=0;dropNum=0;roundNum++;document.getElementById('players-list').innerHTML='';updateUI();renderGrid();rollDrop();setColBtnsDisabled(false);}
function initGame(){initGrid();pool=0;balance=100;dropNum=0;roundNum=1;animating=false;updateUI();renderGrid();renderColBtns();rollDrop();}
function renderGrid(){var el=document.getElementById('grid');el.innerHTML='';for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){var cell=document.createElement('div');cell.className='cell h'+grid[r][c];cell.id='cell-'+r+'-'+c;cell.textContent=grid[r][c]>0?grid[r][c]:'';el.appendChild(cell);}}
function updateCell(r,c){var cell=document.getElementById('cell-'+r+'-'+c);var tags=cell.querySelectorAll('.power-tag');cell.className='cell h'+grid[r][c];cell.textContent=grid[r][c]>0?grid[r][c]:'';for(var i=0;i<tags.length;i++)cell.appendChild(tags[i]);}
function showPowerTag(r,c,remaining,color,playerIdx){var cell=document.getElementById('cell-'+r+'-'+c);var tag=document.createElement('span');tag.className='power-tag';var pos=TAG_POS[playerIdx%TAG_POS.length];if(pos.top)tag.style.top=pos.top;if(pos.bottom)tag.style.bottom=pos.bottom;if(pos.left)tag.style.left=pos.left;if(pos.right)tag.style.right=pos.right;var tf='';if(pos.tx)tf+='translateX('+pos.tx+')';if(pos.ty)tf+='translateY('+pos.ty+')';if(tf)tag.style.transform=tf;tag.style.color=color;tag.textContent=remaining;cell.appendChild(tag);}
function clearPowerTags(){document.querySelectorAll('.power-tag').forEach(function(el){el.remove();});}
function renderColBtns(){var el=document.getElementById('col-btns');el.innerHTML='';for(var c=0;c<COLS;c++){var btn=document.createElement('div');btn.className='col-btn';btn.textContent='\uD83D\uDCA7';btn.onclick=(function(col){return function(){playDrop(col);};})(c);el.appendChild(btn);}}
function updateUI(){document.getElementById('pool-value').textContent=pool.toFixed(2);document.getElementById('balance').textContent=balance.toFixed(2);document.getElementById('drop-num').textContent=dropNum;document.getElementById('round-num').textContent=roundNum;}
function renderPlayersList(players){turnPlayers=players;var el=document.getElementById('players-list');el.innerHTML='';for(var k=0;k<players.length;k++){var item=document.createElement('span');item.className='pc-item';item.id='p-row-'+k;var dot=document.createElement('span');dot.className='pc-dot';dot.style.background=players[k].color;var nm=document.createElement('span');nm.textContent=players[k].name;nm.style.color=players[k].color;var dp=document.createElement('span');dp.className='pc-drop';dp.id='p-drop-'+k;item.appendChild(dot);item.appendChild(nm);item.appendChild(dp);el.appendChild(item);}}
function setPlayerActive(idx){for(var k=0;k<turnPlayers.length;k++){document.getElementById('p-row-'+k).classList.remove('active','done');}document.getElementById('p-row-'+idx).classList.add('active');}
function setPlayerDrop(idx,dp){var el=document.getElementById('p-drop-'+idx);el.textContent=dp;el.classList.add('show');}
function setPlayerRemaining(idx,rem){}
function setPlayerDone(idx){document.getElementById('p-row-'+idx).classList.remove('active');document.getElementById('p-row-'+idx).classList.add('done');}
function rollDrop(){currentDrop=randDrop();var el=document.getElementById('drop-power');el.textContent=currentDrop;el.className='drop-power-value dp'+currentDrop;document.getElementById('drop-who').textContent='DROP';document.getElementById('drop-who').style.color='#d4d4d8';document.getElementById('drop-remaining').innerHTML='';document.getElementById('payout-area').innerHTML='<span style="color:#f59e0b">choose column \u2191</span>';}
function showDropInfo(who,color,power,remaining,spent){document.getElementById('drop-who').textContent=who;document.getElementById('drop-who').style.color=color;var dpEl=document.getElementById('drop-power');dpEl.textContent=power;dpEl.className='drop-power-value dp'+power;var remEl=document.getElementById('drop-remaining');if(spent>0)remEl.innerHTML='\u2212'+spent+' \u2192 <span class="rem">'+remaining+'</span>';else remEl.innerHTML='<span class="rem">'+remaining+'</span>';}
function setColBtnsDisabled(d){document.querySelectorAll('.col-btn').forEach(function(b){if(d)b.classList.add('disabled');else b.classList.remove('disabled');});}
function waitForRotate(){return new Promise(function(resolve){var timer=setTimeout(function(){document.getElementById('grid').onclick=null;resolve();},5000);document.getElementById('grid').onclick=function(){clearTimeout(timer);document.getElementById('grid').onclick=null;resolve();};});}
async function animateDrop(col,dropPower,who,color,playerIdx){
    var power=dropPower,c=col,washed=0;
    showDropInfo(who,color,dropPower,power,0);if(BOTS.length>0){setPlayerActive(playerIdx);setPlayerDrop(playerIdx,dropPower);}
    for(var row=0;row<ROWS&&power>0;row++){
        var cell=document.getElementById('cell-'+row+'-'+c);
        cell.classList.remove('water-hit');void cell.offsetWidth;cell.classList.add('water-hit');
        if(grid[row][c]===0){showDropInfo(who,color,dropPower,power,0);showPowerTag(row,c,power,color,playerIdx);await sleep(ANIM_DELAY/2);if(row<ROWS-1)c=chooseNext(row,c);continue;}
        var stoneH=grid[row][c];
        if(power>=stoneH){power-=stoneH;grid[row][c]=0;washed++;updateCell(row,c);cell.classList.add('washed');showDropInfo(who,color,dropPower,power,stoneH);showPowerTag(row,c,power,color,playerIdx);
        }else{grid[row][c]-=power;showDropInfo(who,color,dropPower,0,power);showPowerTag(row,c,0,color,playerIdx);power=0;updateCell(row,c);}
        await sleep(ANIM_DELAY);if(power>0&&row<ROWS-1)c=chooseNext(row,c);
    }
    if(BOTS.length>0)setPlayerDone(playerIdx);return washed;
}
async function checkWin(winner,winColor){
    var ch=findChannelCells();var keys=Object.keys(ch);
    if(keys.length===0)return false;
    for(var i=0;i<keys.length;i++){var parts=keys[i].split('-');var cell=document.getElementById('cell-'+parts[0]+'-'+parts[1]);cell.style.background=winColor;cell.style.border='2px solid '+winColor;cell.style.boxShadow='0 0 12px '+winColor;var tags=cell.querySelectorAll('.power-tag');for(var t=0;t<tags.length;t++){tags[t].style.color='#000';tags[t].style.textShadow='0 0 3px #fff, 0 0 6px #fff';}}
    var flash=document.getElementById('channel-flash');flash.classList.add('show');
    await sleep(1500);flash.classList.remove('show');
    if(winner==='YOU')balance+=pool;
    updateUI();
    var label=winner+(winner==='YOU'?' WIN':' WINS');
    document.getElementById('payout-area').innerHTML='<div><span style="font-family:Archivo Black,sans-serif;font-size:16px;color:'+winColor+'">'+label+'</span>'+(pool>0?' <span style="font-family:Archivo Black,sans-serif;font-size:22px;color:#fff">'+pool.toFixed(2)+'</span>':'')+'<br><button onclick="newRound()" style="margin-top:6px;background:'+winColor+';color:#0a0a0f;font-family:Archivo Black,sans-serif;font-size:12px;padding:8px 24px;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px">NEXT</button></div>';
    animating=false;setColBtnsDisabled(true);return true;
}
async function doRotation(){
    document.getElementById('rotate-ind').textContent='\u21bb 5s or tap grid';
    document.getElementById('rotate-ind').classList.add('show');
    await waitForRotate();
    rotateGridCW();if(hasChannel()){fillRowIfChannel();}
    clearPowerTags();renderGrid();
    document.getElementById('rotate-ind').textContent='\u21bb rotated 90\u00b0';
    await sleep(600);
    document.getElementById('rotate-ind').classList.remove('show');
}
async function playDrop(startCol){
    if(animating)return;animating=true;setColBtnsDisabled(true);
    if(DROP_COST>0&&balance<DROP_COST){document.getElementById('payout-area').innerHTML='<span style="color:#f66">no balance</span>';animating=false;setColBtnsDisabled(false);return;}
    if(BOTS.length===0){
        clearPowerTags();
        if(DROP_COST>0)balance-=DROP_COST;
        pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();
        await animateDrop(startCol,currentDrop,'YOU','#f59e0b',0);
        if(await checkWin('YOU','#f59e0b'))return;
        if(ROTATE)await doRotation();
        rollDrop();animating=false;setColBtnsDisabled(false);
        return;
    }
    var players=[{name:'YOU',color:'#f59e0b',col:startCol,dp:currentDrop,isPlayer:true}];
    for(var b=0;b<BOTS.length;b++){var botCol=BOTS[b].smart?pickLight():Math.floor(Math.random()*COLS);players.push({name:BOTS[b].name,color:BOTS[b].color,col:botCol,dp:randDrop(),isPlayer:false});}
    for(var i=players.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=players[i];players[i]=players[j];players[j]=tmp;}
    renderPlayersList(players);clearPowerTags();
    for(var t=0;t<players.length;t++){
        var p=players[t];
        if(p.isPlayer&&DROP_COST>0)balance-=DROP_COST;
        pool+=DROP_COST*POOL_RATE;dropNum++;updateUI();
        await animateDrop(p.col,p.dp,p.name,p.color,t);
        if(await checkWin(p.name,p.color))return;
        if(t<players.length-1)await sleep(300);
    }
    if(ROTATE)await doRotation();
    rollDrop();animating=false;setColBtnsDisabled(false);
}
</script>
